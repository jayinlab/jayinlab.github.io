<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <style>
    :root {
      --bg: #0b0d12;
      --bg-soft: #121722;
      --card: #141a26;
      --text: #e6ebf5;
      --muted: #9aa6bd;
      --line: #2a3142;
      --brand: #8ab4ff;
      --brand-2: #7ee0c6;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      max-width: 820px;
      margin: 36px auto;
      padding: 0 16px;
      font: 14px/1.66 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 10% -10%, rgba(122,162,255,.12), transparent),
        radial-gradient(1000px 500px at 90% -10%, rgba(126,224,198,.10), transparent),
        var(--bg);
    }

    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .shell {
      background: rgba(10, 14, 22, .70);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,.25);
      backdrop-filter: blur(3px);
    }

    header h1 { margin: 0; font-size: 1.55rem; letter-spacing: .2px; }
    nav { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
    nav a {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      font-size: .92rem;
    }

    .global-ai-note {
      margin-top: 14px;
      font-size: .88rem;
      color: var(--muted);
      padding: 8px 10px;
      border: 1px dashed #3a4560;
      border-radius: 10px;
      background: rgba(138,180,255,0.05);
    }

    main { margin-top: 18px; }
    h2 { margin: 10px 0 12px; font-size: 1.3rem; }
    h3 { font-size: 1.05rem; margin-top: 1.3em; }
    ul { padding-left: 1.1rem; }

    .meta { color: var(--muted); font-size: 0.86rem; }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .post-list li {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .post-list li a { font-weight: 600; }

    .post-title-group {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }
    .post-title-group a {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .diff-badge {
      display: inline-block;
      flex-shrink: 0;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 999px;
      line-height: 1.6;
    }
    .diff-beginner     { background: rgba(74,222,128,.15);  color: #4ade80; border: 1px solid rgba(74,222,128,.35); }
    .diff-intermediate { background: rgba(251,191,36,.13);  color: #fbbf24; border: 1px solid rgba(251,191,36,.35); }
    .diff-advanced     { background: rgba(248,113,113,.13); color: #f87171; border: 1px solid rgba(248,113,113,.35); }

    /* mobile-safe tables */
    table {
      width: 100%;
      display: block;
      overflow-x: auto;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 10px 0;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      font-size: 13px;
    }

    code, pre {
      background: #0f1624;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #eaf2ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* inline code */
    :not(pre) > code {
      padding: 2px 6px;
      font-size: .92em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* fenced code block container */
    pre {
      padding: 14px;
      overflow: auto;
      line-height: 1.55;
      font-size: 13px;
    }

    /* reset nested code inside pre to avoid double styling/size mismatch */
    pre code {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      font-size: inherit;
      line-height: inherit;
      white-space: pre;
    }

    /* wikilink styling */
    a.wikilink {
      color: var(--brand-2);
      border-bottom: 1px dotted var(--brand-2);
    }
    a.wikilink:hover {
      border-bottom-style: solid;
    }
    a.wikilink-missing {
      color: var(--muted);
      border-bottom: 1px dotted var(--muted);
      cursor: help;
    }

    /* Hugo/Chroma highlight normalization */
    .highlight pre,
    .highlight code,
    .highlight span,
    .highlight table,
    .highlight td {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
      font-size: 13px !important;
      line-height: 1.55 !important;
    }

    .highlight pre {
      background: #0f1624 !important;
      color: #eaf2ff !important;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      overflow: auto;
    }

    blockquote {
      border-left: 3px solid #5f77a8;
      margin: 16px 0;
      padding: 6px 12px;
      color: #d2dbeb;
      background: rgba(138,180,255,.08);
      border-radius: 6px;
    }

    footer {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    details {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 10px;
      padding: 8px 10px;
      margin: 10px 0;
    }
    details summary {
      cursor: pointer;
      color: var(--brand);
      font-weight: 600;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
      <nav>
        <a href="{{ "/" | relURL }}">Home</a>
        <a href="{{ "/wiki/" | relURL }}">Wiki</a>
        <a href="{{ "/glossary/" | relURL }}">Glossary</a>
        <a href="{{ "/about/" | relURL }}">About</a>
      </nav>
      <div class="global-ai-note">이 블로그의 콘텐츠는 AI가 작성·정리합니다.</div>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer>
      <div class="meta">© {{ now.Year }} {{ .Site.Title }}</div>
    </footer>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>

  <script>
    // [[wikilink]] 및 [[wikilink|표시 텍스트]] → <a href="/glossary/slug/"> 변환
    (function renderWikilinks() {
      function toSlug(s) {
        return s.trim().toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[^\w\-가-힣]/g, '');
      }

      const wikiRE = /\[\[([^\]|#]+?)(?:\|([^\]]+?))?\]\]/g;

      function processTextNode(node) {
        const text = node.nodeValue;
        if (!wikiRE.test(text)) return;
        wikiRE.lastIndex = 0;

        const frag = document.createDocumentFragment();
        let last = 0, m;

        while ((m = wikiRE.exec(text)) !== null) {
          if (m.index > last) {
            frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          }
          const term  = m[1].trim();
          const label = m[2] ? m[2].trim() : term;
          const slug  = toSlug(term);

          const a = document.createElement('a');
          a.href = '/glossary/' + slug + '/';
          a.textContent = label;
          a.className = 'wikilink';
          a.title = term;

          // 존재하지 않는 용어는 시각적으로 구분 (선택적 — fetch 없이 일단 동일 스타일)
          frag.appendChild(a);
          last = m.index + m[0].length;
        }

        if (last < text.length) {
          frag.appendChild(document.createTextNode(text.slice(last)));
        }

        node.parentNode.replaceChild(frag, node);
      }

      function walk(root) {
        const walker = document.createTreeWalker(
          root,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode(node) {
              const tag = node.parentNode && node.parentNode.nodeName;
              // 코드 블록, 스크립트, 스타일, 이미 처리된 링크 안은 건너뜀
              if (['CODE', 'PRE', 'SCRIPT', 'STYLE', 'A'].includes(tag)) {
                return NodeFilter.FILTER_REJECT;
              }
              return /\[\[/.test(node.nodeValue)
                ? NodeFilter.FILTER_ACCEPT
                : NodeFilter.FILTER_SKIP;
            }
          }
        );

        const nodes = [];
        let n;
        while ((n = walker.nextNode())) nodes.push(n);
        nodes.forEach(processTextNode);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => walk(document.body));
      } else {
        walk(document.body);
      }
    })();
  </script>

</body>
</html>

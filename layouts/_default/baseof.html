<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <style>
    body { max-width: 760px; margin: 40px auto; padding: 0 16px; font: 16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:#e8e8e8; background:#111; }
    a { color: #8ab4ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header, footer { margin: 20px 0; }
    nav a { margin-right: 14px; }
    code, pre { background:#1b1b1b; border-radius:6px; }
    pre { padding:12px; overflow:auto; }
    blockquote { border-left:3px solid #555; margin: 16px 0; padding: 4px 12px; color:#ccc; }
    .meta { color:#aaa; font-size: 0.9rem; }
    hr { border:0; border-top:1px solid #333; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
    <nav>
      <a href="{{ "/" | relURL }}">Home</a>
      <a href="{{ "/about/" | relURL }}">About</a>
      <a href="{{ "/contact/" | relURL }}">Contact</a>
    </nav>
    <hr>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <hr>
    <div class="meta">© {{ now.Year }} {{ .Site.Title }}</div>
  </footer>
</body>
</html>

{{ define "main" }}
  <article>
    <h2>{{ .Title }}</h2>
    <div class="meta">
      {{ with .Params.tags }}
        {{ range . }}<span style="background:var(--bg-soft);border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:0.82rem;margin-right:4px;">{{ . }}</span>{{ end }}
      {{ end }}
    </div>

    <div style="margin-top: 14px;">
      {{ .Content }}
    </div>

    {{ with .Params.related }}
      <div style="margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--line);">
        <div style="font-weight: 600; color: var(--brand); margin-bottom: 6px;">관련 용어</div>
        <div>
          {{ range . }}
            {{ $slug := . | lower | replaceRE "\\s+" "-" }}
            <a href="/glossary/{{ $slug }}/" class="wikilink" style="margin-right: 10px;">{{ . }}</a>
          {{ end }}
        </div>
      </div>
    {{ end }}

    <div style="margin-top: 8px;">
      <a href="/glossary/" style="font-size: 0.88rem; color: var(--muted);">← Glossary 목록으로</a>
    </div>
  </article>
{{ end }}

{{- $id := printf "bpfull-%d" now.UnixNano -}}
<style>
.bpfull-wrap{max-width:720px;margin:2rem auto;font-family:'Segoe UI',system-ui,sans-serif;}
.bpfull-mobile-hint{display:none;background:#1a2535;border:1px solid #f4a26155;border-radius:6px;padding:7px 12px;font-size:11px;color:#f4a261;margin-bottom:6px;text-align:center;}
@media(max-width:700px){.bpfull-mobile-hint{display:block;}}
.bpfull-hdr{background:#141e2e;border-radius:8px 8px 0 0;padding:6px 12px;display:flex;align-items:center;gap:8px;}
.bpfull-act{font-size:10px;background:#253550;color:#7ee0c6;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.bpfull-snum{font-size:10px;color:#8ab4ff;font-weight:bold;min-width:44px;}
.bpfull-stitle{font-size:12px;color:#c8d0de;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bpfull-cv-wrap{overflow:hidden;line-height:0;background:#0f1624;}
canvas.bpfull-cv{display:block;}
.bpfull-foot{background:#141e2e;border-radius:0 0 8px 8px;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.bpfull-concept{font-size:11px;color:#7ee0c6;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bpfull-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.bpfull-btn{background:#1a2535;border:1px solid #2a3a55;color:#8ab4ff;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;}
.bpfull-btn:hover:not(:disabled){background:#253550;}
.bpfull-btn:disabled{opacity:.4;cursor:default;}
.bpfull-dots{display:flex;gap:4px;align-items:center;}
.bpfull-dot{width:7px;height:7px;border-radius:50%;background:#2a3a55;cursor:pointer;transition:background .2s,transform .2s;}
.bpfull-dot.active{background:#8ab4ff;transform:scale(1.3);}
</style>

<div id="{{ $id }}" class="bpfull-wrap">
  <div class="bpfull-mobile-hint">📱 가로 화면이나 PC에서 더 잘 보입니다 — 터치로 장면 이동 가능</div>
  <div class="bpfull-hdr">
    <span class="bpfull-act"></span>
    <span class="bpfull-snum"></span>
    <span class="bpfull-stitle"></span>
  </div>
  <div class="bpfull-cv-wrap"><canvas class="bpfull-cv"></canvas></div>
  <div class="bpfull-foot">
    <div class="bpfull-concept"></div>
    <div class="bpfull-nav">
      <button class="bpfull-btn bpfull-prev">◀</button>
      <div class="bpfull-dots"></div>
      <button class="bpfull-btn bpfull-next">▶</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var root=document.getElementById('{{ $id }}');
if(!root)return;
var wrap=root.querySelector('.bpfull-cv-wrap');
var cv=root.querySelector('.bpfull-cv');
var g=cv.getContext('2d');
var actEl=root.querySelector('.bpfull-act');
var snEl=root.querySelector('.bpfull-snum');
var stEl=root.querySelector('.bpfull-stitle');
var coEl=root.querySelector('.bpfull-concept');
var prevB=root.querySelector('.bpfull-prev');
var nextB=root.querySelector('.bpfull-next');
var dotsEl=root.querySelector('.bpfull-dots');

// ─── Responsive canvas ───────────────────────────────────────
var W=700,H=390;
var dpr=Math.min(window.devicePixelRatio||1,2);

function resizeCanvas(){
  var cw=root.offsetWidth||W;
  var scale=Math.min(1,cw/W);
  var dw=Math.round(W*scale);
  var dh=Math.round(H*scale);
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=dw+'px'; cv.style.height=dh+'px';
  wrap.style.height=dh+'px';
  g.setTransform(1,0,0,1,0,0);
  g.scale(dpr,dpr);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

// ─── Palette ─────────────────────────────────────────────────
var P={
  bg:'#0f1624',bg2:'#141e2e',bg3:'#1c2840',bg4:'#253550',
  blue:'#8ab4ff',blD:'#4a72cc',
  green:'#7ee0c6',grD:'#3a9a78',
  orange:'#f4a261',orD:'#b06020',
  pink:'#e76f51',
  yellow:'#ffd166',ylD:'#aa8820',
  purple:'#b39ddb',
  red:'#ff6b6b',
  txt:'#e8eaed',muted:'#8b9ab8',dim:'#3a4a6a',
  trA:'#5a8eef',trAd:'#2a4aaa',
  trB:'#2aaa90',trBd:'#1a6a58',
};

// ─── Easing & math ───────────────────────────────────────────
function cl(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?1:hi;return Math.max(lo,Math.min(hi,v));}
function lp(a,b,t){return a+(b-a)*cl(t);}
function wn(t,s,e){return cl((t-s)/(e-s));}
function eO(t){t=cl(t);return 1-Math.pow(1-t,3);}
function eIO(t){t=cl(t);return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function eBounce(t){t=cl(t);var n=7.5625,d=2.75;if(t<1/d)return n*t*t;if(t<2/d)return n*(t-=1.5/d)*t+.75;if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;return n*(t-=2.625/d)*t+.984375;}

// ─── Draw utils ──────────────────────────────────────────────
function rr(x,y,w,h,r,fill,stroke,lw){
  r=r||4;lw=lw||1.5;
  g.beginPath();g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.arcTo(x+w,y,x+w,y+r,r);
  g.lineTo(x+w,y+h-r);g.arcTo(x+w,y+h,x+w-r,y+h,r);
  g.lineTo(x+r,y+h);g.arcTo(x,y+h,x,y+h-r,r);
  g.lineTo(x,y+r);g.arcTo(x,y,x+r,y,r);g.closePath();
  if(fill){g.fillStyle=fill;g.fill();}
  if(stroke){g.strokeStyle=stroke;g.lineWidth=lw;g.stroke();}
}

function tx(s,x,y,opts){
  opts=opts||{};
  g.save();
  if(opts.a!==undefined)g.globalAlpha*=cl(opts.a);
  g.fillStyle=opts.c||P.txt;
  g.font=(opts.w||'normal')+' '+(opts.sz||13)+"px 'Segoe UI',system-ui,sans-serif";
  g.textAlign=opts.al||'center';g.textBaseline=opts.ba||'middle';
  g.fillText(s,x,y);g.restore();
}

function arw(x1,y1,x2,y2,col,lw){
  col=col||P.blue;lw=lw||2;
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  var ux=dx/len,uy=dy/len,hl=8,hw=5;
  g.save();g.strokeStyle=col;g.fillStyle=col;g.lineWidth=lw;
  g.beginPath();g.moveTo(x1,y1);g.lineTo(x2-ux*hl,y2-uy*hl);g.stroke();
  g.beginPath();g.moveTo(x2,y2);g.lineTo(x2-ux*hl-uy*hw,y2-uy*hl+ux*hw);g.lineTo(x2-ux*hl+uy*hw,y2-uy*hl-ux*hw);g.closePath();g.fill();g.restore();
}

// ─── Shared drawing components ───────────────────────────────
var BOXES=[
  {label:'x_buffer', sub:'입력 배열', col:P.blue},
  {label:'y_buffer', sub:'입력/출력', col:P.green},
  {label:'output',   sub:'결과 배열', col:P.orange},
];

function drawBox(x,y,w,h,label,sub,col,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  rr(x,y,w,h,5,col+'28',col);
  tx(label,x+w/2,y+h/2-8,{sz:10,w:'bold',c:col});
  tx(sub,x+w/2,y+h/2+8,{sz:9,c:P.muted});
  g.restore();
}

function drawTruck(x,y,label,col,colD,slots,a){
  a=a===undefined?1:a;
  var BW=228,BH=108,CW=46,CH=60;
  g.save();g.globalAlpha*=cl(a);
  rr(x,y,BW,BH,8,colD+'50',col,2);
  rr(x+BW-2,y+BH-CH,CW,CH,6,colD+'70',col,1.5);
  rr(x+BW+4,y+BH-CH+6,CW-10,22,3,col+'40',col+'80',1);
  if(label)tx(label,x+BW/2-23,y+14,{sz:11,w:'bold',c:col});
  for(var i=0;i<3;i++){
    var sx=x+8+i*72,sy=y+30,sw=62,sh=44;
    var sf=slots&&slots[i];var sc=sf?sf.col:null;
    rr(sx,sy,sw,sh,4,sc?sc+'30':P.bg,sc||P.dim,1.5);
    if(sc){
      tx(sf.label,sx+sw/2,sy+sh/2-6,{sz:9,w:'bold',c:sc});
      tx('칸 '+i,sx+sw/2,sy+sh/2+8,{sz:8,c:P.muted});
    } else {
      tx('칸 '+i,sx+sw/2,sy+sh/2-4,{sz:9,c:P.dim});
      tx('(빈)',sx+sw/2,sy+sh/2+9,{sz:8,c:P.dim});
    }
  }
  for(var wi=0;wi<2;wi++){
    var wx=x+42+wi*110;
    g.fillStyle=P.bg2;g.strokeStyle=col+'88';g.lineWidth=2;
    g.beginPath();g.arc(wx,y+BH+1,13,0,Math.PI*2);g.fill();g.stroke();
    g.beginPath();g.arc(wx,y+BH+1,5,0,Math.PI*2);g.fillStyle=col+'55';g.fill();
  }
  g.restore();
}

function drawForeman(x,y,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  g.strokeStyle=P.yellow;g.fillStyle=P.yellow;g.lineWidth=2.5;
  g.beginPath();g.arc(x,y,11,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(x,y+11);g.lineTo(x,y+40);g.stroke();
  g.beginPath();g.moveTo(x-16,y+22);g.lineTo(x+16,y+22);g.stroke();
  g.beginPath();g.moveTo(x,y+40);g.lineTo(x-11,y+60);g.moveTo(x,y+40);g.lineTo(x+11,y+60);g.stroke();
  g.fillStyle=P.orange;rr(x-13,y-22,26,6,1,P.orange);rr(x-9,y-29,18,9,1,P.orange);
  g.restore();
}

function drawBubble(bx,by,w,h,lines,col,a,sc){
  col=col||P.yellow;a=a===undefined?1:a;sc=sc||1;
  var cx=bx+w/2,cy=by+h/2;
  g.save();g.globalAlpha*=cl(a);
  g.translate(cx,cy);g.scale(sc,sc);g.translate(-w/2,-h/2);
  rr(0,0,w,h,8,col+'25',col,1.5);
  g.fillStyle=col+'25';g.strokeStyle=col;g.lineWidth=1.5;
  g.beginPath();g.moveTo(-14,h*.55);g.lineTo(-4,h*.55-10);g.lineTo(-4,h*.55+10);g.closePath();g.fill();g.stroke();
  for(var i=0;i<lines.length;i++){
    var isSmall=lines[i].charAt(0)==='→'||lines[i].charAt(0)==='(';
    tx(lines[i],w/2,h/2+(i-(lines.length-1)/2)*17,{sz:isSmall?10:12,c:isSmall?P.muted:P.txt});
  }
  g.restore();
}

// float array mini-vis (for box contents)
var FLOAT_VALS=[0.5,1.2,3.7,2.1,0.8,4.1,2.3,0.7,1.9,3.2,0.3,2.8];
function drawFloatArray(x,y,w,h,col,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  var n=FLOAT_VALS.length,cw=(w-4)/n,ch=h-18;
  for(var i=0;i<n;i++){
    var bh2=cw*FLOAT_VALS[i]/4.5;
    g.fillStyle=col+(Math.round(60+i*12).toString(16));
    g.fillRect(x+2+i*cw,y+h-20-bh2,cw-1,bh2);
    if(i<3){
      tx(FLOAT_VALS[i].toFixed(1),x+2+i*cw+cw/2,y+h-8,{sz:7,c:col});
    }
  }
  if(n>3)tx('...',x+w-16,y+h-8,{sz:8,c:P.muted});
  g.restore();
}

// GPU work-items grid
function drawWorkGrid(cx,cy,done,col,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  var cols=8,rows=8,sz=16,gap=2;
  var gw=cols*(sz+gap),gh=rows*(sz+gap);
  var ox=cx-gw/2,oy=cy-gh/2;
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var idx=r*cols+c;
    var isDone=idx<done*64;
    rr(ox+c*(sz+gap),oy+r*(sz+gap),sz,sz,3,isDone?col+'66':P.bg3,isDone?col:P.dim,1);
  }
  g.restore();
}

// ─── Scene metadata ──────────────────────────────────────────
var SCENES=[
  // Act 1: story
  {act:'1막 — 배송 이야기',title:'오늘 배송센터에 보낼 물건이 생겼어요',             concept:'GPU에게 맡길 계산: y = a × x + y  (숫자 1백만 개)',         dur:4500},
  {act:'1막 — 배송 이야기',title:'박스 안에 뭐가 들어있나?',                        concept:'박스 = 숫자 배열 — GPU 메모리에 올라가는 데이터 덩어리',      dur:5000},
  {act:'1막 — 배송 이야기',title:'트럭과 칸 — 어디에 어떻게 실을까?',               concept:'트럭 = Descriptor Set  /  칸 = binding slot',               dur:4000},
  {act:'1막 — 배송 이야기',title:'설계 종이 — 어떤 칸에 어떤 박스가 들어갈 수 있나', concept:'설계 종이 = Descriptor Set Layout + Pipeline Layout',       dur:4500},
  {act:'1막 — 배송 이야기',title:'오늘 배송표 — 실제로 어떤 박스를 어디에?',         concept:'오늘 배송표 = vkUpdateDescriptorSets',                       dur:4500},
  {act:'1막 — 배송 이야기',title:'박스가 트럭 슬롯으로 날아듭니다!',                 concept:'슬롯 채우기 = vkCmdBindDescriptorSets',                      dur:5000},
  {act:'1막 — 배송 이야기',title:'작업반장의 세 마디 → 출발!',                      concept:'작업반장 = CPU  /  세 마디 = vkCmdBind* + vkCmdDispatch',   dur:6500},
  {act:'1막 — 배송 이야기',title:'GPU 공장 도착 — 초고속 처리 후 결과 출력',         concept:'64 work-items 동시 처리 → 결과 배열이 만들어집니다',         dur:5500},
  // Act 2: GPU reveal
  {act:'2막 — GPU 언어로',  title:'지금까지 본 것을 GPU 언어로 다시 보기',           concept:'같은 그림, 다른 이름 — Vulkan / OpenCL API 용어로 매핑',      dur:6000},
  {act:'2막 — GPU 언어로',  title:'이런! 규격이 안 맞으면 어떻게 될까?',             concept:'pipeline create 성공 ≠ dispatch 성공 — 실물이 맞아야 함',   dur:4500},
  {act:'2막 — GPU 언어로',  title:'전체 비유 ↔ 실제 GPU 개념 매핑',                 concept:'모든 조각이 하나의 그림으로!',                               dur:6000},
];

SCENES.forEach(function(_,i){
  var d=document.createElement('span');
  d.className='bpfull-dot'+(i===0?' active':'');
  d.addEventListener('click',function(){jump(i);});
  dotsEl.appendChild(d);
});

var cur=0,scT=0,lastTs=null;

function jump(i){
  cur=cl(i,0,SCENES.length-1);scT=0;lastTs=null;refresh();
}
function refresh(){
  var s=SCENES[cur];
  actEl.textContent=s.act;snEl.textContent=(cur+1)+'/'+SCENES.length;
  stEl.textContent=s.title;coEl.textContent=s.concept;
  prevB.disabled=cur===0;nextB.disabled=cur===SCENES.length-1;
  dotsEl.querySelectorAll('.bpfull-dot').forEach(function(d,i){d.classList.toggle('active',i===cur);});
  // Act color
  actEl.style.color=cur<8?P.orange:P.purple;
  actEl.style.borderColor=cur<8?P.orange+'55':P.purple+'55';
}
prevB.addEventListener('click',function(){jump(cur-1);});
nextB.addEventListener('click',function(){jump(cur+1);});

// Touch swipe
var touchX=null;
cv.addEventListener('touchstart',function(e){touchX=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchend',function(e){
  if(touchX===null)return;
  var dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>40){if(dx<0&&cur<SCENES.length-1)jump(cur+1);else if(dx>0&&cur>0)jump(cur-1);}
  touchX=null;
},{passive:true});

var DRAWS=[s1,s2,s3,s4,s5,s6,s7,s8,s9,s10,s11];

function loop(ts){
  if(!lastTs)lastTs=ts;
  var dt=ts-lastTs;lastTs=ts;
  scT=Math.min(1,scT+dt/SCENES[cur].dur);
  g.fillStyle=P.bg;g.fillRect(0,0,W,H);
  DRAWS[cur](scT);
  requestAnimationFrame(loop);
}
refresh();
requestAnimationFrame(loop);

// ══════════════════════════════════════════════════════════
// SCENE 1 — 오늘 할 일: saxpy 소개
// ══════════════════════════════════════════════════════════
function s1(t){
  // Task formula
  var fa=eO(wn(t,0,0.3));
  g.save();g.globalAlpha*=fa;
  rr(160,55,380,72,10,P.bg3,P.blue+'55',1.5);
  tx('오늘 계산해야 할 것',350,75,{sz:11,c:P.muted});
  tx('y  =  a × x  +  y',350,105,{sz:22,w:'bold',c:P.txt});
  g.restore();

  // Data scale
  if(t>0.28){
    var da=eO(wn(t,0.28,0.5));
    tx('숫자 1,000,000개  ×  이 계산 = GPU가 필요해요!',350,153,{sz:12,c:P.muted,a:da});
  }

  // 3 boxes appear staggered
  var BX=[68,253,438],BY=200,BW=130,BH=68;
  var BCOLS=[P.blue,P.green,P.orange];
  var BLABS=['x_buffer','y_buffer','output'];
  var BSUBS=['입력 x 배열','입출력 y 배열','결과 저장소'];
  for(var i=0;i<3;i++){
    var ba=eO(wn(t,0.38+i*0.1,0.62+i*0.1));
    var by2=lp(260,BY,eO(wn(t,0.38+i*0.1,0.62+i*0.1)));
    drawBox(BX[i],by2,BW,BH,BLABS[i],BSUBS[i],BCOLS[i],ba);
  }

  // "send to GPU factory" hint
  if(t>0.8){
    var ha=eO(wn(t,0.8,1));
    rr(200,295,300,42,8,P.bg3,P.green+'55',1);
    tx('이 박스들을 GPU 배송센터로 보냅니다 →',350,316,{sz:11,c:P.green,a:ha});
  }
}

// ══════════════════════════════════════════════════════════
// SCENE 2 — 박스 안에 뭐가?
// ══════════════════════════════════════════════════════════
function s2(t){
  tx('박스 안을 열어봅시다',350,28,{sz:13,c:P.muted});

  // --- x_buffer box (main, opens) ---
  var boxX=60,boxY=80,boxW=250,boxH=180;
  var lidOpen=eO(wn(t,0.1,0.55)); // 0=closed, 1=fully open
  var col=P.blue;

  // Box body
  rr(boxX,boxY+22,boxW,boxH-22,6,col+'22',col,2);
  // Inside content (reveals as lid opens)
  if(lidOpen>0.1){
    var ca=eO(wn(lidOpen,0.1,0.8));
    // float array visualization
    drawFloatArray(boxX+8,boxY+30,boxW-16,boxH-50,col,ca);
    tx('float 값 × 1,000,000개',boxX+boxW/2,boxY+boxH-10,{sz:10,c:col,a:ca});
    // sample values
    g.save();g.globalAlpha*=ca;
    rr(boxX+8,boxY+32,boxW-16,28,3,P.bg3,col+'44',1);
    tx('[ 0.5f, 1.2f, 3.7f, 2.1f, 0.8f, 4.1f, … ]',boxX+boxW/2,boxY+46,{sz:9,c:P.muted});
    g.restore();
  }
  // Lid (animates upward)
  var lidY=boxY-lidOpen*36;
  rr(boxX,lidY,boxW,22,6,col+'66',col,2);
  tx('x_buffer',boxX+boxW/2,lidY+11,{sz:10,w:'bold',c:col});
  // Lid hinge line
  g.save();g.strokeStyle=col;g.lineWidth=1;g.setLineDash([3,3]);
  g.beginPath();g.moveTo(boxX+8,boxY+22);g.lineTo(boxX+boxW-8,boxY+22);g.stroke();
  g.setLineDash([]);g.restore();

  // "= VkBuffer" label
  if(t>0.5){
    var va=eO(wn(t,0.5,0.7));
    rr(boxX+boxW+12,boxY+60,170,44,6,P.bg3,P.blue+'66',1.5);
    tx('= VkBuffer',boxX+boxW+97,boxY+75,{sz:12,w:'bold',c:P.blue,a:va});
    tx('GPU 메모리의 데이터',boxX+boxW+97,boxY+93,{sz:9,c:P.muted,a:va});
    arw(boxX+boxW+2,boxY+82,boxX+boxW+10,boxY+82,P.blue,1.5);
  }

  // Other two boxes (smaller, on right)
  if(t>0.6){
    var ra=eO(wn(t,0.6,0.8));

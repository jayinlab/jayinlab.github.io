{{- $id := printf "bpfull-%d" now.UnixNano -}}
<style>
.bpfull-wrap{max-width:720px;margin:2rem auto;font-family:'Segoe UI',system-ui,sans-serif;}
.bpfull-hdr{background:#141e2e;border-radius:8px 8px 0 0;padding:7px 14px;display:flex;align-items:center;gap:8px;}
.bpfull-snum{font-size:11px;color:#8ab4ff;font-weight:bold;min-width:54px;}
.bpfull-stitle{font-size:12px;color:#c8d0de;}
canvas.bpfull-cv{display:block;width:100%;background:#0f1624;}
.bpfull-foot{background:#141e2e;border-radius:0 0 8px 8px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bpfull-concept{font-size:11px;color:#7ee0c6;flex:1;}
.bpfull-nav{display:flex;align-items:center;gap:7px;}
.bpfull-btn{background:#1a2535;border:1px solid #2a3a55;color:#8ab4ff;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:12px;}
.bpfull-btn:hover:not(:disabled){background:#253550;}
.bpfull-btn:disabled{opacity:.4;cursor:default;}
.bpfull-dots{display:flex;gap:5px;align-items:center;}
.bpfull-dot{width:7px;height:7px;border-radius:50%;background:#2a3a55;cursor:pointer;transition:background .2s,transform .2s;}
.bpfull-dot.active{background:#8ab4ff;transform:scale(1.3);}
</style>

<div id="{{ $id }}" class="bpfull-wrap">
  <div class="bpfull-hdr">
    <span class="bpfull-snum"></span>
    <span class="bpfull-stitle"></span>
  </div>
  <canvas class="bpfull-cv"></canvas>
  <div class="bpfull-foot">
    <div class="bpfull-concept"></div>
    <div class="bpfull-nav">
      <button class="bpfull-btn bpfull-prev">◀ 이전</button>
      <div class="bpfull-dots"></div>
      <button class="bpfull-btn bpfull-next">다음 ▶</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var el=document.getElementById('{{ $id }}');
if(!el)return;
var cv=el.querySelector('.bpfull-cv');
var g=cv.getContext('2d');
var snEl=el.querySelector('.bpfull-snum');
var stEl=el.querySelector('.bpfull-stitle');
var coEl=el.querySelector('.bpfull-concept');
var prevB=el.querySelector('.bpfull-prev');
var nextB=el.querySelector('.bpfull-next');
var dotsEl=el.querySelector('.bpfull-dots');

var W=700,H=390;
var dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr;cv.height=H*dpr;
cv.style.width=W+'px';cv.style.height=H+'px';
g.scale(dpr,dpr);

var P={
  bg:'#0f1624',bg2:'#141e2e',bg3:'#1c2840',bg4:'#253550',
  blue:'#8ab4ff',blD:'#4a72cc',
  green:'#7ee0c6',grD:'#3a9a78',
  orange:'#f4a261',orD:'#b06020',
  pink:'#e76f51',
  yellow:'#ffd166',ylD:'#aa8820',
  purple:'#b39ddb',
  red:'#ff6b6b',
  txt:'#e8eaed',muted:'#8b9ab8',dim:'#3a4a6a',
  trA:'#5a8eef',trAd:'#2a4aaa',
  trB:'#2aaa90',trBd:'#1a6a58',
};

function cl(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?1:hi;return Math.max(lo,Math.min(hi,v));}
function lp(a,b,t){return a+(b-a)*cl(t);}
function wn(t,s,e){return cl((t-s)/(e-s));}
function eO(t){t=cl(t);return 1-Math.pow(1-t,3);}
function eIO(t){t=cl(t);return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function eBounce(t){t=cl(t);var n=7.5625,d=2.75;if(t<1/d)return n*t*t;if(t<2/d)return n*(t-=1.5/d)*t+.75;if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;return n*(t-=2.625/d)*t+.984375;}

function rr(x,y,w,h,r,fill,stroke,lw){
  r=r||4;lw=lw||1.5;
  g.beginPath();
  g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.arcTo(x+w,y,x+w,y+r,r);
  g.lineTo(x+w,y+h-r);g.arcTo(x+w,y+h,x+w-r,y+h,r);
  g.lineTo(x+r,y+h);g.arcTo(x,y+h,x,y+h-r,r);
  g.lineTo(x,y+r);g.arcTo(x,y,x+r,y,r);
  g.closePath();
  if(fill){g.fillStyle=fill;g.fill();}
  if(stroke){g.strokeStyle=stroke;g.lineWidth=lw;g.stroke();}
}

function tx(s,x,y,opts){
  opts=opts||{};
  g.save();
  if(opts.a!==undefined)g.globalAlpha*=cl(opts.a);
  g.fillStyle=opts.c||P.txt;
  g.font=(opts.w||'normal')+' '+(opts.sz||13)+"px 'Segoe UI',system-ui,sans-serif";
  g.textAlign=opts.al||'center';
  g.textBaseline=opts.ba||'middle';
  g.fillText(s,x,y);
  g.restore();
}

function arw(x1,y1,x2,y2,col,lw){
  col=col||P.blue;lw=lw||2;
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  var ux=dx/len,uy=dy/len,hl=9,hw=5;
  g.save();g.strokeStyle=col;g.fillStyle=col;g.lineWidth=lw;
  g.beginPath();g.moveTo(x1,y1);g.lineTo(x2-ux*hl,y2-uy*hl);g.stroke();
  g.beginPath();g.moveTo(x2,y2);
  g.lineTo(x2-ux*hl-uy*hw,y2-uy*hl+ux*hw);
  g.lineTo(x2-ux*hl+uy*hw,y2-uy*hl-ux*hw);
  g.closePath();g.fill();g.restore();
}

// Resource box
function drawBox(x,y,w,h,label,sub,col,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  rr(x,y,w,h,5,col+'2a',col);
  tx(label,x+w/2,y+h/2-8,{sz:10,w:'bold',c:col});
  tx(sub,x+w/2,y+h/2+9,{sz:9,c:P.muted});
  g.restore();
}

// Truck (body left + cab right, wheels below)
function drawTruck(x,y,label,col,colD,slots,a){
  a=a===undefined?1:a;
  var BW=230,BH=108,CW=48,CH=62;
  g.save();g.globalAlpha*=cl(a);
  // Body
  rr(x,y,BW,BH,8,colD+'50',col,2);
  // Cab
  rr(x+BW-2,y+BH-CH,CW,CH,6,colD+'70',col,1.5);
  // Cab window
  rr(x+BW+4,y+BH-CH+6,CW-10,24,3,col+'40',col+'80',1);
  // Label (truck name)
  tx(label,x+BW/2-24,y+14,{sz:11,w:'bold',c:col});
  // Slots
  for(var i=0;i<3;i++){
    var sx=x+8+i*73,sy=y+30,sw=63,sh=44;
    var sf=slots&&slots[i];
    var sc=sf?sf.col:null;
    rr(sx,sy,sw,sh,4,sc?sc+'30':P.bg,sc||P.dim,1.5);
    if(sc){
      tx(sf.label,sx+sw/2,sy+sh/2-6,{sz:9,w:'bold',c:sc});
      tx('칸 '+i,sx+sw/2,sy+sh/2+8,{sz:8,c:P.muted});
    } else {
      tx('칸 '+i,sx+sw/2,sy+sh/2-5,{sz:9,c:P.dim});
      tx('(빈)',sx+sw/2,sy+sh/2+8,{sz:8,c:P.dim});
    }
  }
  // Wheels
  for(var wi=0;wi<2;wi++){
    var wx=x+45+wi*110;
    g.fillStyle=P.bg2;g.strokeStyle=col+'88';g.lineWidth=2;
    g.beginPath();g.arc(wx,y+BH+1,13,0,Math.PI*2);g.fill();g.stroke();
    g.beginPath();g.arc(wx,y+BH+1,5,0,Math.PI*2);
    g.fillStyle=col+'55';g.fill();
  }
  g.restore();
}

// Stick foreman
function drawForeman(x,y,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  g.strokeStyle=P.yellow;g.fillStyle=P.yellow;g.lineWidth=2.5;
  g.beginPath();g.arc(x,y,11,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(x,y+11);g.lineTo(x,y+40);g.stroke();
  g.beginPath();g.moveTo(x-16,y+22);g.lineTo(x+16,y+22);g.stroke();
  g.beginPath();g.moveTo(x,y+40);g.lineTo(x-11,y+60);g.moveTo(x,y+40);g.lineTo(x+11,y+60);g.stroke();
  g.fillStyle=P.orange;
  rr(x-13,y-22,26,6,1,P.orange);
  rr(x-9,y-29,18,9,1,P.orange);
  g.restore();
}

// Speech bubble (tail on left side)
function drawBubble(bx,by,w,h,lines,col,a,scale){
  col=col||P.yellow;a=a===undefined?1:a;scale=scale||1;
  var cx=bx+w/2,cy=by+h/2;
  g.save();g.globalAlpha*=cl(a);
  g.translate(cx,cy);g.scale(scale,scale);g.translate(-w/2,-h/2);
  rr(0,0,w,h,8,col+'25',col,1.5);
  // Tail
  g.fillStyle=col+'25';g.strokeStyle=col;g.lineWidth=1.5;
  g.beginPath();g.moveTo(-14,h*0.55);g.lineTo(-4,h*0.55-10);g.lineTo(-4,h*0.55+10);g.closePath();
  g.fill();g.stroke();
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var isSmall=line.charAt(0)==='→'||line.charAt(0)==='(';
    tx(line,w/2,h/2+(i-(lines.length-1)/2)*17,{sz:isSmall?10:12,c:isSmall?P.muted:P.txt});
  }
  g.restore();
}

// Paper (unfolds top-to-bottom)
function drawPaper(x,y,w,h,lines,col,prog,a){
  col=col||'#ffffff';prog=prog===undefined?1:prog;a=a===undefined?1:a;
  var dh=h*eO(prog);
  g.save();g.globalAlpha*=cl(a);
  g.beginPath();g.rect(x,y,w,dh);g.clip();
  rr(x,y,w,h,6,col+'18',col+'cc',1.5);
  for(var i=0;i<lines.length;i++){
    var ly=y+18+i*17;
    if(ly<y+dh-4){
      tx(lines[i],x+10,ly,{sz:i===0?12:11,w:i===0?'bold':'normal',c:i===0?P.txt:P.muted,al:'left'});
    }
  }
  g.restore();
}

// PM4 packet
function drawPacket(x,y,label,col,a){
  col=col||P.purple;a=a===undefined?1:a;
  g.save();g.globalAlpha*=cl(a);
  rr(x-34,y-12,68,24,4,col+'25',col,1.5);
  tx(label,x,y,{sz:9,w:'bold',c:col});
  g.restore();
}

// ─── Scene metadata ───
var SCENES=[
  {title:'①  배송센터에 오신 것을 환영합니다!',     concept:'배송센터 = GPU (고속 병렬 처리 공장)',                    dur:4500},
  {title:'②  박스들이 도착했습니다',                 concept:'박스 = GPU 리소스 — VkBuffer, VkImage …',              dur:4000},
  {title:'③  트럭과 칸 (Descriptor Set & binding)', concept:'트럭 = Descriptor Set  /  칸 번호 = binding index',      dur:4000},
  {title:'④  설계 종이 — 트럭 규격서 (DSL)',        concept:'설계 종이 = Descriptor Set Layout + Pipeline Layout',    dur:4500},
  {title:'⑤  오늘 작업 종이 — 박스 배정표',         concept:'오늘 작업 종이 = vkUpdateDescriptorSets',               dur:4500},
  {title:'⑥  박스가 슬롯으로 날아듭니다!',           concept:'슬롯 채우기 = vkCmdBindDescriptorSets',                 dur:5000},
  {title:'⑦  작업반장의 세 마디',                   concept:'작업반장 = CPU (host)  /  vkCmd* 호출 순서',            dur:6500},
  {title:'⑧  트럭 출발 — GPU로!',                   concept:'출발! = vkCmdDispatch → GPU 실행 시작',                 dur:5000},
  {title:'⑨  이런! 규격이 안 맞아요',               concept:'pipeline create 성공 ≠ dispatch 성공 — 실물이 맞아야 함',dur:4500},
  {title:'⑩  신호실 — PM4 패킷으로 번역',           concept:'신호실 = 드라이버 → PM4 패킷 → GPU 하드웨어',           dur:4500},
  {title:'⑪  전체 비유 ↔ 실제 개념 매핑',           concept:'모든 조각이 하나의 그림으로!',                           dur:5500},
];

SCENES.forEach(function(_,i){
  var d=document.createElement('span');
  d.className='bpfull-dot'+(i===0?' active':'');
  d.addEventListener('click',function(){jump(i);});
  dotsEl.appendChild(d);
});

var cur=0,scT=0,lastTs=null;

function jump(i){cur=cl(i,0,SCENES.length-1);scT=0;lastTs=null;refresh();}
function refresh(){
  var s=SCENES[cur];
  snEl.textContent='장면 '+(cur+1)+'/'+SCENES.length;
  stEl.textContent=s.title;
  coEl.textContent=s.concept;
  prevB.disabled=cur===0;
  nextB.disabled=cur===SCENES.length-1;
  dotsEl.querySelectorAll('.bpfull-dot').forEach(function(d,i){d.classList.toggle('active',i===cur);});
}
prevB.addEventListener('click',function(){jump(cur-1);});
nextB.addEventListener('click',function(){jump(cur+1);});

var DRAWS=[s1,s2,s3,s4,s5,s6,s7,s8,s9,s10,s11];

function loop(ts){
  if(!lastTs)lastTs=ts;
  var dt=ts-lastTs;lastTs=ts;
  scT=Math.min(1,scT+dt/SCENES[cur].dur);
  g.fillStyle=P.bg;g.fillRect(0,0,W,H);
  DRAWS[cur](scT);
  requestAnimationFrame(loop);
}
refresh();
requestAnimationFrame(loop);

// ══════════════════════════════════════════════
// SCENE 1 — 배송센터 소개
// ══════════════════════════════════════════════
function s1(t){
  var bT=eO(wn(t,0,0.5));
  // Ground
  g.fillStyle=P.bg3;g.fillRect(60,286,580,6);
  // Building grows up
  var bx=215,by=55,bw=270,bh=228;
  if(bT>0){
    var dh=bh*bT;
    rr(bx,by+bh-dh,bw,dh,8,P.bg3,P.blue,2);
    // Windows
    if(bT>0.45){
      var wa=eO(wn(bT,0.45,0.75));
      g.save();g.globalAlpha*=wa*0.35;g.fillStyle=P.blue;
      for(var r=0;r<2;r++)for(var c=0;c<3;c++){
        g.fillRect(bx+18+c*82,by+bh-dh+24+r*68,54,40);
      }
      g.restore();
    }
    // Door
    if(bT>0.6){
      var da=eO(wn(bT,0.6,0.9));
      g.save();g.globalAlpha*=da;
      rr(bx+98,by+bh-72,74,72,4,P.bg2,P.blue+'88',1.5);
      g.fillStyle=P.yellow;g.beginPath();g.arc(bx+158,by+bh-36,4,0,Math.PI*2);g.fill();
      g.restore();
    }
  }
  // Roof
  if(bT>0.5){
    var ra=eO(wn(bT,0.5,0.82));
    g.save();g.globalAlpha*=ra;
    g.fillStyle=P.orange;g.beginPath();
    g.moveTo(350,28);g.lineTo(bx-20,by);g.lineTo(bx+bw+20,by);g.closePath();g.fill();
    g.strokeStyle=P.orD;g.lineWidth=1.5;g.stroke();
    // Flag
    g.strokeStyle=P.muted;g.lineWidth=1.5;
    g.beginPath();g.moveTo(350,28);g.lineTo(350,6);g.stroke();
    g.fillStyle=P.blue;g.beginPath();g.moveTo(350,6);g.lineTo(370,12);g.lineTo(350,18);g.closePath();g.fill();
    g.restore();
  }
  // Sign
  if(bT>0.55){
    var sa=eO(wn(bT,0.55,0.9));
    tx('배송센터',bx+bw/2,by+bh/2-12,{sz:26,w:'bold',c:P.txt,a:sa});
    tx('(= GPU)',bx+bw/2,by+bh/2+20,{sz:15,c:P.blue,a:sa});
  }
  // Workers
  if(bT>0.72){
    var wfa=eO(wn(bT,0.72,1));
    drawForeman(155,218,wfa*0.65);
    drawForeman(548,218,wfa*0.65);
  }
  // Labels
  if(t>0.6){
    var la=eO(wn(t,0.6,0.85));
    g.save();g.globalAlpha*=la;
    rr(20,108,140,30,5,P.bg4,P.blue+'66',1);
    tx('병렬 처리 공장',90,123,{sz:10,c:P.blue});
    arw(160,123,bx-4,by+bh/2,P.blue,1.5);
    rr(540,108,140,30,5,P.bg4,P.green+'66',1);
    tx('수천 개 동시 작업',610,123,{sz:10,c:P.green});
    arw(540,123,bx+bw+4,by+bh/2,P.green,1.5);
    g.restore();
  }
  // Tagline
  if(t>0.82){
    var ta=eO(wn(t,0.82,1));
    tx('"생각은 미리, 실행은 초고속으로"',350,lp(360,335,ta),{sz:12,c:P.muted,a:ta});
  }
}

// ══════════════════════════════════════════════
// SCENE 2 — 박스들 등장
// ══════════════════════════════════════════════
var RBOXES=[
  {label:'x_buffer',sub:'VkBuffer',col:P.blue},
  {label:'y_buffer',sub:'VkBuffer',col:P.green},
  {label:'output',  sub:'VkBuffer',col:P.orange},
  {label:'texture', sub:'VkImage', col:P.pink},
];
var BOXFX=[60,192,324,456];
var BOXFY=140;
var BOXW=110,BOXH=64;

function s2(t){
  // Title area
  tx('GPU가 다루는 "박스" (리소스) 종류들',350,30,{sz:13,c:P.muted});
  for(var i=0;i<4;i++){
    var b=RBOXES[i];
    var slide=eO(wn(t,i*0.12,i*0.12+0.28));
    var bx=lp(-BOXW-10,BOXFX[i],slide);
    drawBox(bx,BOXFY,BOXW,BOXH,b.label,b.sub,b.col,slide);
    // Labels below
    if(slide>0.7){
      var la=eO(wn(slide,0.7,1));
      tx(b.sub,BOXFX[i]+BOXW/2,BOXFY+BOXH+16,{sz:10,c:b.col,a:la});
    }
  }
  // Arrow showing "into GPU"
  if(t>0.72){
    var aa=eO(wn(t,0.72,0.92));
    g.save();g.globalAlpha*=aa;
    // GPU building (small, right side)
    rr(568,100,110,100,6,P.bg3,P.blue,1.5);
    tx('GPU',623,150,{sz:18,w:'bold',c:P.blue});
    for(var bi=0;bi<4;bi++){
      arw(BOXFX[bi]+BOXW,BOXFY+BOXH/2,568,150,RBOXES[bi].col,1.5);
    }
    g.restore();
  }
  // Concept bar (bottom)
  if(t>0.88){
    var ca=eO(wn(t,0.88,1));
    rr(80,318,540,38,6,P.bg3,P.blue+'55',1);
    tx('📦 박스 = GPU가 다루는 실제 데이터 덩어리 (버퍼, 이미지)',350,337,{sz:11,c:P.muted,a:ca});
  }
}

// ══════════════════════════════════════════════
// SCENE 3 — 트럭과 칸
// ══════════════════════════════════════════════
function s3(t){
  tx('트럭 = Descriptor Set  /  칸 = binding',350,28,{sz:13,c:P.muted});
  // Truck A slides in from left
  var tAx=lp(-280,30,eO(wn(t,0,0.35)));
  drawTruck(tAx,80,'트럭 A (set=0)',P.trA,P.trAd,null,eO(wn(t,0,0.35)));
  // Truck B slides in from right
  var tBx=lp(W+20,400,eO(wn(t,0.15,0.5)));
  drawTruck(tBx,80,'트럭 B (set=1)',P.trB,P.trBd,null,eO(wn(t,0.15,0.5)));
  // Labels appear
  if(t>0.5){
    var la=eO(wn(t,0.5,0.72));
    tx('트럭 번호 = set index',145,215,{sz:11,c:P.trA,a:la});
    tx('트럭 번호 = set index',515,215,{sz:11,c:P.trB,a:la});
    // Slot zoom explanation
    g.save();g.globalAlpha*=la;
    rr(210,250,280,80,8,P.bg3,P.muted+'44',1);
    tx('[ 칸 0 ]  [ 칸 1 ]  [ 칸 2 ]',350,275,{sz:13,c:P.txt});
    tx('칸 번호 = binding index',350,298,{sz:11,c:P.muted});
    tx('칸 규격 = descriptor type (어떤 박스를 넣을 수 있는지)',350,318,{sz:10,c:P.dim+'cc'});
    g.restore();
  }
  // Additional labels for truck parts
  if(t>0.7){
    var pa=eO(wn(t,0.7,0.9));
    // Arrows pointing to slots
    g.save();g.globalAlpha*=pa;
    arw(350,248,145,115,P.muted,1.5);
    tx('3개의 슬롯',350,240,{sz:10,c:P.muted});
    g.restore();
  }
}

// ══════════════════════════════════════════════
// SCENE 4 — 설계 종이 (DSL)

// ══════════════════════════════════════════════
// SCENE 6 — 박스가 슬롯으로 날아듭니다!
// ══════════════════════════════════════════════
var SLOT_BOXES=[
  {label:'x_buffer',sub:'VkBuffer',col:P.blue},
  {label:'y_buffer',sub:'VkBuffer',col:P.green},
  {label:'output',  sub:'VkBuffer',col:P.orange},
];
var SLOT_START=[[55,70],[55,175],[55,270]];
// Truck at (270, 130), slots at binding 0/1/2
// Slot centers inside truck: (270+8+0*73+63/2, 130+30+44/2) = (310, 174)
var SLOT_END=[[310,174],[383,174],[456,174]];

function s6(t){
  // Empty truck (destination)
  var trFills={};
  var BOX_DUR=[[0.08,0.32],[0.28,0.52],[0.48,0.72]];
  for(var i=0;i<3;i++){
    if(t>=BOX_DUR[i][1])trFills[i]=SLOT_BOXES[i];
  }
  drawTruck(270,130,'트럭 A (set=0)',P.trA,P.trAd,trFills,1);
  tx('← dispatch 전 binding 완료',392,260,{sz:10,c:P.muted});

  // Flying boxes
  for(var bi=0;bi<3;bi++){
    var bx2=RBOXES[bi];
    var bwin=BOX_DUR[bi];
    var bp=wn(t,bwin[0],bwin[1]);
    var arrived=t>=bwin[1];
    if(!arrived && bp>=0){
      var bfx=lp(SLOT_START[bi][0],SLOT_END[bi][0]-30,eIO(bp));
      var bfy=lp(SLOT_START[bi][1],SLOT_END[bi][1]-18,eIO(bp));
      // Arc trajectory (arc up then down)
      var arcY=bfy-Math.sin(bp*Math.PI)*40;
      drawBox(bfx,arcY,BOXW,BOXH,SLOT_BOXES[bi].label,SLOT_BOXES[bi].sub,SLOT_BOXES[bi].col,1);
      // Trail dots
      g.save();g.globalAlpha*=0.3;
      for(var step=0;step<5;step++){
        var tp=Math.max(0,bp-step*0.06);
        var tx2=lp(SLOT_START[bi][0],SLOT_END[bi][0]-30,eIO(tp));
        var ty2=lp(SLOT_START[bi][1],SLOT_END[bi][1]-18,eIO(tp))-Math.sin(tp*Math.PI)*40;
        g.fillStyle=SLOT_BOXES[bi].col;
        g.beginPath();g.arc(tx2+30,ty2+18,3-step*0.4,0,Math.PI*2);g.fill();
      }
      g.restore();
    } else if(!arrived){
      // Waiting on left
      drawBox(SLOT_START[bi][0],SLOT_START[bi][1],BOXW,BOXH,SLOT_BOXES[bi].label,SLOT_BOXES[bi].sub,SLOT_BOXES[bi].col,1);
    }
    // Slot glow effect when just arrived
    if(arrived && t<bwin[1]+0.08){
      var gt=wn(t,bwin[1],bwin[1]+0.08);
      var glow=Math.sin(gt*Math.PI);
      g.save();
      var sx=270+8+bi*73,sy=130+30;
      g.shadowColor=SLOT_BOXES[bi].col;
      g.shadowBlur=14*glow;
      rr(sx,sy,63,44,4,SLOT_BOXES[bi].col+(Math.round(glow*100).toString(16).padStart(2,'0')));
      g.restore();
    }
  }
  // Final message
  if(t>0.8){
    var fa=eO(wn(t,0.8,1));
    rr(270,280,360,42,6,P.bg3,P.green+'55',1);
    tx('✓ 3개 슬롯 모두 채워짐 → 준비 완료!',450,301,{sz:11,c:P.green,a:fa});
  }
}

    g.restore();
  }
  // Key insight
  if(t>0.75){
    var ka=eO(wn(t,0.75,0.95));

}

<div id="chain-v3" style="border:1px solid #2a3142;border-radius:12px;padding:12px;background:#0f1624;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
    <button id="play-chain">▶ Play 3 Steps</button>
    <button id="reset-chain">Reset</button>
    <label style="color:#cfe0ff;font-size:13px;">속도</label>
    <input id="speed" type="range" min="0.6" max="2" value="1" step="0.1">
    <span id="speed-val" style="color:#9fb4da;font-size:13px;">1.0x</span>
  </div>

  <div style="position:relative;border:1px solid #31415f;border-radius:10px;padding:12px;height:200px;overflow:hidden;">
    <div style="position:absolute;left:12px;top:24px;color:#cfe0ff;font-size:13px;">Compile chain (slow)</div>
    <div style="position:absolute;left:12px;top:112px;color:#cfe0ff;font-size:13px;">Submit chain (fast)</div>

    <div style="position:absolute;left:12px;right:12px;top:52px;height:2px;background:#4f648f"></div>
    <div style="position:absolute;left:12px;right:12px;top:140px;height:2px;background:#4f648f"></div>

    <div style="position:absolute;left:12px;top:45px;width:10px;height:10px;border-radius:50%;background:#7ee0c6" id="dotC"></div>
    <div style="position:absolute;left:12px;top:133px;width:10px;height:10px;border-radius:50%;background:#8ab4ff" id="dotS"></div>

    <div id="msg-chain" style="position:absolute;left:12px;bottom:10px;color:#cfe0ff;font-size:13px;">대기 중</div>
  </div>
</div>

<script>
(() => {
  const root = document.getElementById('chain-v3');
  if (!root) return;
  const dotC = root.querySelector('#dotC');
  const dotS = root.querySelector('#dotS');
  const speed = root.querySelector('#speed');
  const speedVal = root.querySelector('#speed-val');
  const msg = root.querySelector('#msg-chain');
  const playBtn = root.querySelector('#play-chain');
  const resetBtn = root.querySelector('#reset-chain');

  let raf = null;
  let running = false;
  const width = () => root.querySelector('[style*="right:12px"]').clientWidth - 12;

  function reset(){
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    running = false;
    dotC.style.left = '12px';
    dotS.style.left = '12px';
    msg.textContent = '대기 중';
  }

  function animate(durationMs, updater){
    return new Promise(resolve => {
      const start = performance.now();
      function step(now){
        const k = parseFloat(speed.value||'1');
        speedVal.textContent = k.toFixed(1)+'x';
        const t = Math.min(1, (now - start) / (durationMs / k));
        updater(t);
        if (t < 1) raf = requestAnimationFrame(step);
        else resolve();
      }
      raf = requestAnimationFrame(step);
    });
  }

  async function play(){
    if (running) return;
    running = true;
    const w = width();

    msg.textContent = 'Step1: compile chain 준비(느림)';
    await animate(1600, t => { dotC.style.left = (12 + w * t*0.55) + 'px'; });

    msg.textContent = 'Step2: submit chain 빠르게 진행';
    await animate(1000, t => { dotS.style.left = (12 + w * t*0.8) + 'px'; });

    msg.textContent = 'Step3: dispatch 도달 (submit이 먼저 도착)';
    await animate(900, t => {
      dotC.style.left = (12 + w * (0.55 + 0.45*t)) + 'px';
      dotS.style.left = (12 + w * (0.8 + 0.2*t)) + 'px';
    });
    running = false;
  }

  playBtn.addEventListener('click', play);
  resetBtn.addEventListener('click', reset);
  reset();
})();
</script>

<div id="compat-v3" style="border:1px solid #2a3142;border-radius:12px;padding:12px;background:#0f1624;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
    <button id="play-compat">▶ Play 3 Steps</button>
    <button data-case="good">Set X (호환)</button>
    <button data-case="bad">Set Y (비호환)</button>
    <button id="reset-compat">Reset</button>
  </div>

  <div style="display:grid;grid-template-columns:1fr;gap:10px;">
    <div style="border:1px solid #31415f;border-radius:10px;padding:10px;">
      <div style="color:#cfe0ff;font-weight:600;margin-bottom:6px;">Contract (Pipeline Layout)</div>
      <div style="font-size:13px;color:#a9b7d3;line-height:1.5;">
        set0: b0/b1/b2 = storage<br>
        push constant: int(4 bytes)
      </div>
    </div>

    <div style="border:1px solid #31415f;border-radius:10px;padding:10px;">
      <div style="color:#cfe0ff;font-weight:600;margin-bottom:6px;">Current Set</div>
      <div id="set-desc" style="font-size:13px;color:#a9b7d3;line-height:1.5;"></div>
    </div>

    <div style="border:1px solid #31415f;border-radius:10px;padding:10px;">
      <div style="color:#cfe0ff;font-weight:600;margin-bottom:6px;">Slots</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div id="slot-b0" style="padding:8px 10px;border-radius:8px;background:#1b2438;color:#d5e0ff;">b0</div>
        <div id="slot-b1" style="padding:8px 10px;border-radius:8px;background:#1b2438;color:#d5e0ff;">b1</div>
        <div id="slot-b2" style="padding:8px 10px;border-radius:8px;background:#1b2438;color:#d5e0ff;">b2</div>
      </div>
    </div>
  </div>

  <div id="compat-status-v3" style="margin-top:12px;font-size:14px;color:#cfe0ff;">대기 중</div>
</div>

<script>
(() => {
  const root = document.getElementById('compat-v3');
  if (!root) return;
  const desc = root.querySelector('#set-desc');
  const status = root.querySelector('#compat-status-v3');
  const slots = {
    b0: root.querySelector('#slot-b0'),
    b1: root.querySelector('#slot-b1'),
    b2: root.querySelector('#slot-b2')
  };
  const cases = {
    good: { name: 'Set X', b0: 'storage', b1: 'storage', b2: 'storage' },
    bad:  { name: 'Set Y', b0: 'uniform', b1: 'storage', b2: 'storage' }
  };
  let current = 'good';
  let running = false;

  function renderSet() {
    const c = cases[current];
    desc.innerHTML = `${c.name}<br>- b0: ${c.b0}<br>- b1: ${c.b1}<br>- b2: ${c.b2}`;
  }
  function resetSlots() {
    Object.values(slots).forEach(el => {
      el.style.background = '#1b2438';
      el.style.outline = 'none';
      el.style.transform = 'translateY(0px)';
      el.style.transition = 'all .35s ease';
    });
  }
  function step1() {
    resetSlots();
    status.textContent = 'Step1: 계약 확인 (b0/b1/b2 모두 storage 필요)';
    status.style.color = '#9fc2ff';
  }
  function step2() {
    const c = cases[current];
    ['b0','b1','b2'].forEach(k => {
      slots[k].style.transform = 'translateY(-3px)';
      slots[k].style.background = (c[k] === 'storage') ? '#1f7a5a' : '#7a2a2a';
    });
    status.textContent = 'Step2: bind 시도 (slot 타입 대조)';
    status.style.color = '#9fc2ff';
  }
  function step3() {
    const c = cases[current];
    const ok = c.b0 === 'storage' && c.b1 === 'storage' && c.b2 === 'storage';
    status.textContent = ok ? 'Step3: ✅ compatible (bind 성공)' : 'Step3: ❌ incompatible (b0 타입 불일치)';
    status.style.color = ok ? '#7ee0c6' : '#ff9f9f';
    slots.b0.style.outline = ok ? '2px solid #7ee0c6' : '2px solid #ff9f9f';
  }

  async function play(){
    if (running) return;
    running = true;
    step1(); await new Promise(r=>setTimeout(r,900));
    step2(); await new Promise(r=>setTimeout(r,1100));
    step3();
    running = false;
  }

  root.querySelector('#play-compat').addEventListener('click', play);
  root.querySelector('#reset-compat').addEventListener('click', ()=>{ step1(); });
  root.querySelectorAll('button[data-case]').forEach(btn => {
    btn.addEventListener('click', ()=>{ current = btn.getAttribute('data-case'); renderSet(); step1(); });
  });

  renderSet(); step1();
})();
</script>

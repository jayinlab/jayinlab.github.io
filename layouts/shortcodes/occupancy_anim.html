<div id="occ-root" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:#e6ebf5;">
<style>
#occ-root * { box-sizing: border-box; }
#occ-root .occ-card { background:#0f1624;border:1px solid #2a3142;border-radius:12px;padding:14px 16px;margin-bottom:12px; }
#occ-root .occ-title { font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#6b7fa3;margin-bottom:10px; }

/* CU slots grid */
#occ-root .wf-slots { display:flex;flex-wrap:wrap;gap:5px; }
#occ-root .wf-slot {
  width:48px;height:44px;border-radius:7px;border:1px solid #2a3142;background:#141a26;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;text-align:center;transition:background .3s,border-color .3s;
}
#occ-root .wf-slot.used   { background:rgba(126,224,198,.18);border-color:#7ee0c6; }
#occ-root .wf-slot.blocked { background:rgba(255,200,80,.12);border-color:#ffc850; }
#occ-root .wf-slot.empty   { background:#0d111c;border-color:#1e2535;opacity:.45; }

/* resource bars */
#occ-root .res-row { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
#occ-root .res-label { font-size:11px;min-width:90px;color:#9aa6bd; }
#occ-root .res-track { flex:1;height:14px;background:#1e2840;border-radius:999px;overflow:hidden; }
#occ-root .res-fill { height:100%;border-radius:999px;transition:width .5s; }
#occ-root .res-val { font-size:11px;font-family:ui-monospace,monospace;min-width:80px;color:#e6ebf5; }

/* occupancy indicator */
#occ-root .occ-num {
  font-size:2.2rem;font-weight:900;text-align:center;margin:8px 0 2px;
  transition:color .3s;
}
#occ-root .occ-bar-wrap { height:16px;background:#1e2840;border-radius:999px;overflow:hidden;margin:4px 0; }
#occ-root .occ-bar-fill { height:100%;border-radius:999px;transition:width .5s,background .3s; }
#occ-root .occ-comment { font-size:12px;text-align:center;color:#9aa6bd;min-height:20px; }

/* step box */
#occ-root .step-box { background:rgba(138,180,255,.07);border:1px solid #2a3142;border-left:3px solid #8ab4ff;border-radius:8px;padding:10px 14px;min-height:52px;line-height:1.6; }
#occ-root .step-number { display:inline-block;background:#8ab4ff;color:#0b0d12;font-weight:700;font-size:11px;border-radius:999px;padding:1px 7px;margin-right:6px; }

/* controls */
#occ-root .ctrl-row { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center; }
#occ-root button { background:#141a26;border:1px solid #2a3142;border-radius:8px;color:#e6ebf5;padding:6px 14px;cursor:pointer;font-size:12px;transition:background .2s,border-color .2s; }
#occ-root button:hover { background:#1e2840;border-color:#8ab4ff; }
#occ-root button.primary { background:rgba(138,180,255,.15);border-color:#8ab4ff;color:#8ab4ff;font-weight:600; }
#occ-root .step-counter { color:#6b7fa3;font-size:12px;margin-left:auto; }
</style>

<!-- controls -->
<div class="ctrl-row">
  <button id="occ-prev">← 이전</button>
  <button id="occ-next" class="primary">다음 단계 →</button>
  <button id="occ-auto">▶ 자동 재생</button>
  <button id="occ-reset">↺ 처음</button>
  <span class="step-counter" id="occ-counter">Step 0</span>
</div>

<!-- step desc -->
<div class="step-box" id="occ-step-desc">
  <span class="step-number">시작</span>
  <strong>Occupancy 시뮬레이터</strong><br>
  <span style="color:#9aa6bd;font-size:12px;">"다음 단계"로 레지스터·LDS 사용량이 occupancy에 어떤 영향을 주는지 확인하세요.</span>
</div>

<!-- CU Wavefront Slots -->
<div class="occ-card">
  <div class="occ-title">Compute Unit — Wavefront 슬롯 (최대 16개)</div>
  <div class="wf-slots" id="occ-slots"></div>
  <div style="margin-top:8px;font-size:11px;color:#6b7fa3;">
    <span style="color:#7ee0c6;font-weight:700;">■</span> 활성 wavefront &nbsp;
    <span style="color:#ffc850;font-weight:700;">■</span> 리소스 부족으로 배치 불가 &nbsp;
    <span style="color:#1e2535;font-weight:700;">■</span> 빈 슬롯
  </div>
</div>

<!-- Resource usage -->
<div class="occ-card">
  <div class="occ-title">리소스 사용량</div>
  <div class="res-row">
    <span class="res-label">Register / WF</span>
    <div class="res-track"><div class="res-fill" id="occ-reg-fill" style="background:#8ab4ff;width:0%;"></div></div>
    <span class="res-val" id="occ-reg-val">—</span>
  </div>
  <div class="res-row">
    <span class="res-label">LDS / WG</span>
    <div class="res-track"><div class="res-fill" id="occ-lds-fill" style="background:#ffc850;width:0%;"></div></div>
    <span class="res-val" id="occ-lds-val">—</span>
  </div>
  <div class="res-row">
    <span class="res-label">WG size</span>
    <div class="res-track"><div class="res-fill" id="occ-wg-fill" style="background:#7ee0c6;width:0%;"></div></div>
    <span class="res-val" id="occ-wg-val">—</span>
  </div>
</div>

<!-- Occupancy result -->
<div class="occ-card">
  <div class="occ-title">Occupancy</div>
  <div class="occ-num" id="occ-num">—</div>
  <div class="occ-bar-wrap"><div class="occ-bar-fill" id="occ-bar" style="width:0%;"></div></div>
  <div class="occ-comment" id="occ-comment"></div>
</div>

<script>
(function(){
const MAX_WF = 16;   // 이론적 최대 wavefront per CU (RDNA 기준 예시)
const REG_FILE = 256; // KB (레지스터 파일)
const LDS_SIZE = 64;  // KB per CU

const STEPS = [
  { desc:'<span class="step-number">1</span><strong>CU 기본 상태 — 아직 커널 없음</strong><br><span style="color:#9aa6bd;font-size:12px;">CU에는 이론적으로 최대 16개의 wavefront 슬롯이 있습니다. 실제로 얼마나 채울 수 있는지는 커널의 리소스 사용량에 달려 있습니다.</span>', wfUsed:0, wfBlocked:0, reg:0, lds:0, wgSize:0, occStr:'0 / 16', occPct:0, comment:'커널 없음' },
  { desc:'<span class="step-number">2</span><strong>Case A: 레지스터 32개, LDS 4KB, WG=64</strong><br><span style="color:#9aa6bd;font-size:12px;">가벼운 커널입니다. 레지스터를 적게 써서 CU에 많은 wavefront를 올릴 수 있습니다.</span>', wfUsed:16, wfBlocked:0, reg:32, lds:4, wgSize:64, occStr:'16 / 16 (100%)', occPct:100, comment:'최적 🎉 — latency hiding 능력 최대', regLimit:'32 regs × 64 lanes × 4B = 8KB/WF → 256KB ÷ 8KB = 32WF (WF 한도 16개)', ldsLimit:'4KB/WG × (16WF÷1WF/WG) = 64KB — LDS 한도 딱 맞음' },
  { desc:'<span class="step-number">3</span><strong>Case B: 레지스터 64개로 증가</strong><br><span style="color:#9aa6bd;font-size:12px;">레지스터 사용량이 2배가 됐습니다. 이제 CU에 올릴 수 있는 wavefront 수가 절반으로 줄어듭니다.</span>', wfUsed:8, wfBlocked:8, reg:64, lds:4, wgSize:64, occStr:'8 / 16 (50%)', occPct:50, comment:'Occupancy 50% — latency hiding 능력 반감', regLimit:'64 regs × 64 lanes × 4B = 16KB/WF → 256KB ÷ 16KB = 16WF 가능 (한도 16개지만 실제 8개)', ldsLimit:'LDS는 여유 있음' },
  { desc:'<span class="step-number">4</span><strong>Case C: 레지스터 128개 — 더 줄어듦</strong><br><span style="color:#9aa6bd;font-size:12px;">레지스터 사용량이 많은 compute-heavy 커널. 이론상 한 CU에 4개 wavefront만 올릴 수 있습니다.</span>', wfUsed:4, wfBlocked:12, reg:128, lds:4, wgSize:64, occStr:'4 / 16 (25%)', occPct:25, comment:'Occupancy 25% 😰 — memory latency를 숨기기 어려워짐', regLimit:'128 regs × 64 lanes × 4B = 32KB/WF → 256KB ÷ 32KB = 8WF 가능 (실제 한도 고려 4개)', ldsLimit:'LDS는 여유 있음' },
  { desc:'<span class="step-number">5</span><strong>Case D: LDS를 많이 쓰는 경우 (32KB/WG)</strong><br><span style="color:#9aa6bd;font-size:12px;">LDS를 많이 쓰면 같은 CU에 올릴 수 있는 work-group 수가 줄어들고, 그 안의 wavefront 수도 줄어듭니다.</span>', wfUsed:2, wfBlocked:14, reg:32, lds:32, wgSize:64, occStr:'2 / 16 (12.5%)', occPct:12, comment:'LDS 병목 😰 — CU당 64KB ÷ 32KB/WG = 2 work-group만 가능', regLimit:'레지스터는 여유 있음', ldsLimit:'32KB/WG × 2WG = 64KB — LDS 꽉 참! 더 이상 올릴 수 없음' },
  { desc:'<span class="step-number">6</span><strong>실전: occupancy를 높이려면?</strong><br><span style="color:#9aa6bd;font-size:12px;">레지스터와 LDS 사용량을 줄이면 occupancy가 올라가고 latency hiding이 개선됩니다. 단, 알고리즘 복잡도와 trade-off를 고려해야 합니다.</span>', wfUsed:12, wfBlocked:0, reg:48, lds:8, wgSize:64, occStr:'12 / 16 (75%)', occPct:75, comment:'튜닝 결과 75% — 실용적인 범위 ✓', regLimit:'레지스터 줄임: 48 regs → 약 12WF 가능', ldsLimit:'LDS 줄임: 8KB/WG → 8WG 가능 (wavefront 한도가 먼저 걸림)' },
];

// 슬롯 생성
const slotsEl = document.getElementById('occ-slots');
for (let i = 0; i < MAX_WF; i++) {
  const d = document.createElement('div');
  d.className = 'wf-slot';
  d.id = 'os-' + i;
  d.innerHTML = '<span style="font-size:9px;color:#3a4560;">WF#'+i+'</span>';
  slotsEl.appendChild(d);
}

let step = 0, autoTimer = null;

function applyStep(s) {
  document.getElementById('occ-step-desc').innerHTML = s.desc;
  document.getElementById('occ-counter').textContent = 'Step ' + step + ' / ' + (STEPS.length - 1);

  // slots
  for (let i = 0; i < MAX_WF; i++) {
    const el = document.getElementById('os-' + i);
    const lbl = el.querySelector('span');
    if (i < s.wfUsed) {
      el.className = 'wf-slot used';
      lbl.style.color = '#7ee0c6';
    } else if (i < s.wfUsed + s.wfBlocked) {
      el.className = 'wf-slot blocked';
      lbl.style.color = '#ffc850';
      lbl.textContent = '제한';
    } else {
      el.className = 'wf-slot empty';
      lbl.style.color = '#3a4560';
      lbl.textContent = 'WF#'+i;
    }
  }

  // resource bars
  const regPct = Math.min((s.reg / 128) * 100, 100);
  const ldsPct = Math.min((s.lds / 64) * 100, 100);
  const wgPct  = Math.min((s.wgSize / 256) * 100, 100);
  document.getElementById('occ-reg-fill').style.width = regPct + '%';
  document.getElementById('occ-reg-val').textContent = s.reg > 0 ? s.reg + ' regs/WF' : '—';
  document.getElementById('occ-lds-fill').style.width = ldsPct + '%';
  document.getElementById('occ-lds-val').textContent = s.lds > 0 ? s.lds + ' KB/WG' : '—';
  document.getElementById('occ-wg-fill').style.width = wgPct + '%';
  document.getElementById('occ-wg-val').textContent = s.wgSize > 0 ? s.wgSize + ' work-items' : '—';

  // occupancy
  document.getElementById('occ-num').textContent = s.occStr;
  document.getElementById('occ-num').style.color = s.occPct >= 75 ? '#7ee0c6' : s.occPct >= 50 ? '#ffc850' : '#ff9090';
  document.getElementById('occ-bar').style.width = s.occPct + '%';
  document.getElementById('occ-bar').style.background = s.occPct >= 75 ? '#7ee0c6' : s.occPct >= 50 ? '#ffc850' : '#ff9090';
  document.getElementById('occ-comment').textContent = s.comment || '';
}

function resetAll() {
  stopAuto();
  step = 0;
  document.getElementById('occ-step-desc').innerHTML = '<span class="step-number">시작</span><strong>Occupancy 시뮬레이터</strong><br><span style="color:#9aa6bd;font-size:12px;">"다음 단계"로 레지스터·LDS 사용량이 occupancy에 어떤 영향을 주는지 확인하세요.</span>';
  document.getElementById('occ-counter').textContent = 'Step 0';
  for (let i = 0; i < MAX_WF; i++) {
    const el = document.getElementById('os-' + i);
    el.className = 'wf-slot';
    el.querySelector('span').textContent = 'WF#'+i;
    el.querySelector('span').style.color = '#3a4560';
  }
  ['occ-reg-fill','occ-lds-fill','occ-wg-fill'].forEach(id => { document.getElementById(id).style.width = '0%'; });
  ['occ-reg-val','occ-lds-val','occ-wg-val'].forEach(id => { document.getElementById(id).textContent = '—'; });
  document.getElementById('occ-num').textContent = '—';
  document.getElementById('occ-num').style.color = '#e6ebf5';
  document.getElementById('occ-bar').style.width = '0%';
  document.getElementById('occ-comment').textContent = '';
}

function goStep(n) {
  if (n < 1 || n >= STEPS.length) return;
  step = n;
  applyStep(STEPS[n]);
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  document.getElementById('occ-auto').textContent = '▶ 자동 재생';
}

document.getElementById('occ-next').addEventListener('click', () => { stopAuto(); if (step < STEPS.length - 1) goStep(step + 1); });
document.getElementById('occ-prev').addEventListener('click', () => { stopAuto(); const t = step - 1; resetAll(); for (let i = 1; i <= t; i++) goStep(i); });
document.getElementById('occ-reset').addEventListener('click', resetAll);
document.getElementById('occ-auto').addEventListener('click', () => {
  if (autoTimer) { stopAuto(); return; }
  document.getElementById('occ-auto').textContent = '⏸ 일시정지';
  if (step === 0) goStep(1);
  autoTimer = setInterval(() => { if (step >= STEPS.length - 1) { stopAuto(); return; } goStep(step + 1); }, 2600);
});
})();
</script>
</div>

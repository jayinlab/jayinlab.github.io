<div id="barrier-scope-anim" style="border:1px solid #2a3142;border-radius:12px;padding:12px;background:#0f1624;margin:12px 0;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
    <button id="play-barrier-scope" style="padding:6px 10px;">в–¶ Play</button>
    <button id="reset-barrier-scope" style="padding:6px 10px;">вҶә Reset</button>
    <span style="font-size:13px;color:#c7d2fe">к°ҷмқҖ work-group лӮҙл¶Җм—җм„ңл§Ң barrier лҸҷкё°нҷ”</span>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="border:1px solid #334155;border-radius:10px;padding:10px;background:#111827;">
      <div style="font-weight:600;margin-bottom:8px;">Work-group A</div>
      <div id="groupA" style="display:grid;grid-template-columns:repeat(4,28px);gap:6px;"></div>
    </div>
    <div style="border:1px solid #334155;border-radius:10px;padding:10px;background:#111827;">
      <div style="font-weight:600;margin-bottom:8px;">Work-group B</div>
      <div id="groupB" style="display:grid;grid-template-columns:repeat(4,28px);gap:6px;"></div>
    </div>
  </div>

  <div id="barrier-msg" style="margin-top:10px;font-size:13px;color:#e5e7eb"></div>
</div>

<script>
(() => {
  const mk = (rootId, prefix) => {
    const root = document.getElementById(rootId);
    const cells = [];
    for (let i=0;i<8;i++) {
      const c = document.createElement('div');
      c.textContent = prefix + i;
      c.style.width='28px'; c.style.height='28px';
      c.style.display='grid'; c.style.placeItems='center';
      c.style.border='1px solid #475569'; c.style.borderRadius='6px';
      c.style.background='#1f2937'; c.style.color='#cbd5e1'; c.style.fontSize='11px';
      root.appendChild(c); cells.push(c);
    }
    return cells;
  };

  const A = mk('groupA','A');
  const B = mk('groupB','B');
  const msg = document.getElementById('barrier-msg');

  function reset() {
    [...A,...B].forEach(c=>{c.style.background='#1f2937'; c.style.borderColor='#475569'; c.style.color='#cbd5e1';});
    msg.textContent = 'мҙҲкё° мғҒнғң: л‘җ groupмқҙ лҸ…лҰҪм ҒмңјлЎң мӢӨн–ү мӨ‘';
  }

  function mark(cells, idxs, color, text='') {
    idxs.forEach(i=>{cells[i].style.background=color; cells[i].style.color='#0b1020'; cells[i].style.borderColor=color;});
    if (text) msg.textContent=text;
  }

  let timers=[];
  function play() {
    timers.forEach(clearTimeout); timers=[];
    reset();
    timers.push(setTimeout(()=>mark(A,[0,1,2],'#34d399','A group мқјл¶Җ work-itemмқҙ barrier лҸ„лӢ¬'), 500));
    timers.push(setTimeout(()=>mark(A,[3,4,5,6,7],'#f59e0b','A group лӮҳлЁём§Җк°Җ м•„м§Ғ barrier м „'), 1200));
    timers.push(setTimeout(()=>mark(B,[0,1,2,3,4,5,6,7],'#60a5fa','B groupмқҖ barrierмҷҖ л¬ҙкҙҖн•ҳкІҢ кі„мҶҚ м§„н–ү к°ҖлҠҘ'), 2000));
    timers.push(setTimeout(()=>mark(A,[3,4,5,6,7],'#34d399','A group м „мӣҗмқҙ barrier лҸ„лӢ¬ вҶ’ A лӮҙл¶Җ лҸҷкё°нҷ” мҷ„лЈҢ'), 2800));
    timers.push(setTimeout(()=>{
      mark(A,[0,1,2,3,4,5,6,7],'#22d3ee','AлҠ” barrier мқҙнӣ„ лӢЁкі„ м§„н–ү');
      msg.textContent='кІ°лЎ : barrierлҠ” к°ҷмқҖ work-group лӮҙл¶Җм—җм„ңл§Ң мң нҡЁ. group к°„ лҸҷкё°нҷ”лҠ” м»Өл„җ кІҪкі„/мқҙлІӨнҠёлЎң мІҳлҰ¬.';
    }, 3600));
  }

  document.getElementById('play-barrier-scope').addEventListener('click', play);
  document.getElementById('reset-barrier-scope').addEventListener('click', reset);
  reset();
})();
</script>

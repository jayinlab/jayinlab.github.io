{{- $id := printf "oclbp-%d" now.UnixNano -}}
<style>
.oclbp-wrap{max-width:720px;margin:2rem auto;font-family:'Segoe UI',system-ui,sans-serif;}
.oclbp-mobile-hint{display:none;background:#0e1f1c;border:1px solid #00c9a755;border-radius:6px;padding:7px 12px;font-size:11px;color:#00c9a7;margin-bottom:6px;text-align:center;}
@media(max-width:700px){.oclbp-mobile-hint{display:block;}}
.oclbp-hdr{background:#0e1a18;border-radius:8px 8px 0 0;padding:6px 12px;display:flex;align-items:center;gap:8px;}
.oclbp-act{font-size:10px;background:#163028;color:#00c9a7;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.oclbp-snum{font-size:10px;color:#7ee0c6;font-weight:bold;min-width:44px;}
.oclbp-stitle{font-size:12px;color:#c8d0de;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.oclbp-cv-wrap{overflow:hidden;line-height:0;background:#0a1612;}
canvas.oclbp-cv{display:block;}
.oclbp-foot{background:#0e1a18;border-radius:0 0 8px 8px;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.oclbp-concept{font-size:11px;color:#7ee0c6;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.oclbp-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.oclbp-btn{background:#0e1f1c;border:1px solid #1a3530;color:#7ee0c6;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;}
.oclbp-btn:hover:not(:disabled){background:#163028;}
.oclbp-btn:disabled{opacity:.4;cursor:default;}
.oclbp-dots{display:flex;gap:4px;align-items:center;}
.oclbp-dot{width:7px;height:7px;border-radius:50%;background:#1a3530;cursor:pointer;transition:background .2s,transform .2s;}
.oclbp-dot.active{background:#00c9a7;transform:scale(1.3);}
</style>

<div id="{{ $id }}" class="oclbp-wrap">
  <div class="oclbp-mobile-hint">📱 가로 화면이나 PC에서 더 잘 보입니다 — 터치로 장면 이동 가능</div>
  <div class="oclbp-hdr">
    <span class="oclbp-act"></span>
    <span class="oclbp-snum"></span>
    <span class="oclbp-stitle"></span>
  </div>
  <div class="oclbp-cv-wrap"><canvas class="oclbp-cv"></canvas></div>
  <div class="oclbp-foot">
    <div class="oclbp-concept"></div>
    <div class="oclbp-nav">
      <button class="oclbp-btn oclbp-prev">◀</button>
      <div class="oclbp-dots"></div>
      <button class="oclbp-btn oclbp-next">▶</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var root=document.getElementById('{{ $id }}');
if(!root)return;
var wrap=root.querySelector('.oclbp-cv-wrap');
var cv=root.querySelector('.oclbp-cv');
var g=cv.getContext('2d');
var actEl=root.querySelector('.oclbp-act');
var snEl=root.querySelector('.oclbp-snum');
var stEl=root.querySelector('.oclbp-stitle');
var coEl=root.querySelector('.oclbp-concept');
var prevB=root.querySelector('.oclbp-prev');
var nextB=root.querySelector('.oclbp-next');
var dotsEl=root.querySelector('.oclbp-dots');

var W=700,H=390;
var dpr=Math.min(window.devicePixelRatio||1,2);
function resizeCanvas(){
  var cw=root.offsetWidth||W;
  var sc=Math.min(1,cw/W);
  var dw=Math.round(W*sc),dh=Math.round(H*sc);
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=dw+'px';cv.style.height=dh+'px';
  wrap.style.height=dh+'px';
  g.setTransform(1,0,0,1,0,0);g.scale(dpr,dpr);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

var P={
  bg:'#0a1612',bg2:'#0e1a18',bg3:'#122018',bg4:'#163028',
  teal:'#00c9a7',tealD:'#007a64',teal2:'#00e5bf',
  blue:'#8ab4ff',blD:'#4a72cc',
  green:'#7ee0c6',grD:'#3a9a78',
  orange:'#f4a261',orD:'#b06020',
  pink:'#e76f51',yellow:'#ffd166',purple:'#b39ddb',red:'#ff6b6b',
  txt:'#e8eaed',muted:'#7a9a8a',dim:'#1e3830',
  xBuf:'#8ab4ff',yBuf:'#7ee0c6',oBuf:'#f4a261',aBuf:'#ffd166',
  intel:'#0071c5',amd:'#ed1c24',nvidia:'#76b900',
};

/* ── helpers ── */
function cl(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?1:hi;return Math.max(lo,Math.min(hi,v));}
function eO(t){t=cl(t);return 1-(1-t)*(1-t)*(1-t);}
function eIO(t){t=cl(t);return t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function eBounce(t){t=cl(t);var n=7.5625,d=2.75;if(t<1/d)return n*t*t;if(t<2/d){t-=1.5/d;return n*t*t+0.75;}if(t<2.5/d){t-=2.25/d;return n*t*t+0.9375;}t-=2.625/d;return n*t*t+0.984375;}
function wn(t,s,e){return cl((t-s)/(e-s));}
function lp(a,b,t){return a+(b-a)*t;}

function rr(x,y,w,h,r,fill,stroke,sw){
  g.beginPath();
  if(g.roundRect){g.roundRect(x,y,w,h,r);}
  else{
    r=Math.min(r,w/2,h/2);
    g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.arcTo(x+w,y,x+w,y+r,r);
    g.lineTo(x+w,y+h-r);g.arcTo(x+w,y+h,x+w-r,y+h,r);
    g.lineTo(x+r,y+h);g.arcTo(x,y+h,x,y+h-r,r);
    g.lineTo(x,y+r);g.arcTo(x,y,x+r,y,r);g.closePath();
  }
  if(fill){g.fillStyle=fill;g.fill();}
  if(stroke&&sw){g.strokeStyle=stroke;g.lineWidth=sw;g.stroke();}
}

function tx(s,x,y,opt){
  opt=opt||{};
  var sz=opt.sz||12,c=opt.c||P.txt,a=opt.a===undefined?1:opt.a,
      al=opt.al||'center',w=opt.w||'normal';
  g.save();g.globalAlpha*=a;
  g.fillStyle=c;g.font=w+' '+sz+'px "Segoe UI",system-ui,sans-serif';
  g.textAlign=al;g.textBaseline='middle';
  g.fillText(s,x,y);
  g.restore();
}

function arr(x1,y1,x2,y2,col,lw,a,headSz){
  a=a===undefined?1:a;lw=lw||1.5;headSz=headSz||7;
  g.save();g.globalAlpha*=a;
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1){g.restore();return;}
  var ux=dx/len,uy=dy/len;
  g.strokeStyle=col;g.lineWidth=lw;g.lineCap='round';
  g.beginPath();g.moveTo(x1,y1);g.lineTo(x2-ux*headSz*0.5,y2-uy*headSz*0.5);g.stroke();
  g.fillStyle=col;g.beginPath();
  g.moveTo(x2,y2);
  g.lineTo(x2-ux*headSz-uy*headSz*0.4,y2-uy*headSz+ux*headSz*0.4);
  g.lineTo(x2-ux*headSz+uy*headSz*0.4,y2-uy*headSz-ux*headSz*0.4);
  g.closePath();g.fill();
  g.restore();
}

function codeLine(s,x,y,a,col){
  tx(s,x,y,{sz:10,c:col||P.teal,a:a||1,al:'left',w:'normal'});
}

/* ── component helpers ── */
function drawBuf(x,y,label,content,col,a){
  a=a===undefined?1:a;
  var W2=136,H2=52;
  g.save();g.globalAlpha*=a;
  rr(x,y,W2,H2,6,P.bg3,col,1.5);
  tx(label,x+W2/2,y+14,{sz:10,c:col,w:'bold'});
  tx(content,x+W2/2,y+34,{sz:9,c:P.muted});
  g.restore();
}

function drawSmallBuf(x,y,label,col,a){
  a=a===undefined?1:a;
  var W2=100,H2=32;
  g.save();g.globalAlpha*=a;
  rr(x,y,W2,H2,5,P.bg3,col,1.5);
  tx(label,x+W2/2,y+H2/2,{sz:9,c:col,w:'bold'});
  g.restore();
}

function drawKernelBox(x,y,label,nArgs,a){
  a=a===undefined?1:a;
  var BW=140,BH=30+nArgs*26;
  g.save();g.globalAlpha*=a;
  rr(x,y,BW,BH,8,P.bg3,P.teal,1.8);
  tx('⚙ '+label,x+BW/2,y+16,{sz:10,c:P.teal,w:'bold'});
  for(var i=0;i<nArgs;i++){
    var ly=y+32+i*26;
    rr(x+10,ly,BW-20,20,4,P.bg4,P.dim,1);
    tx('arg'+i,x+30,ly+10,{sz:8,c:P.muted});
  }
  g.restore();
  return {x:x,y:y,BW:BW,BH:BH};
}

function drawPlatformCard(x,y,label,sublabel,col,selected,a){
  a=a===undefined?1:a;
  var W2=120,H2=64;
  g.save();g.globalAlpha*=a;
  rr(x,y,W2,H2,8,selected?P.bg4:P.bg3,col,selected?2.5:1.5);
  if(selected){
    g.save();g.globalAlpha*=0.15;rr(x,y,W2,H2,8,col,'',0);g.fill();g.restore();
  }
  tx(label,x+W2/2,y+22,{sz:13,c:col,w:'bold'});
  tx(sublabel,x+W2/2,y+42,{sz:9,c:selected?P.txt:P.muted});
  if(selected){tx('✓ 선택됨',x+W2/2,y+56,{sz:8,c:col});}
  g.restore();
}

function drawDeviceChip(x,y,label,type,col,a){
  a=a===undefined?1:a;
  var W2=110,H2=44;
  g.save();g.globalAlpha*=a;
  rr(x,y,W2,H2,6,P.bg4,col,2);
  tx(label,x+W2/2,y+14,{sz:9,c:col,w:'bold'});
  tx(type,x+W2/2,y+30,{sz:8,c:P.muted});
  g.restore();
}

function drawContextBox(x,y,w,h,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=a;
  rr(x,y,w,h,10,P.bg2,P.tealD,1.5);
  g.setLineDash([5,3]);g.strokeStyle=P.teal+'66';g.lineWidth=1;
  g.beginPath();if(g.roundRect)g.roundRect(x+4,y+4,w-8,h-8,8);
  else{g.rect(x+4,y+4,w-8,h-8);}g.stroke();g.setLineDash([]);
  tx('cl_context',x+w/2,y+14,{sz:9,c:P.teal+'aa',w:'bold'});
  g.restore();
}

function drawQueueBox(x,y,items,a){
  a=a===undefined?1:a;
  var QW=190,QH=28+items.length*24;
  g.save();g.globalAlpha*=a;
  rr(x,y,QW,QH,8,P.bg2,P.green,1.5);
  tx('cl_command_queue',x+QW/2,y+14,{sz:9,c:P.green,w:'bold'});
  for(var i=0;i<items.length;i++){
    var iy=y+24+i*24;
    rr(x+8,iy,QW-16,20,4,P.bg4,P.grD,1);
    tx(items[i].label,x+QW/2,iy+10,{sz:8,c:items[i].col||P.green});
  }
  g.restore();
}

function drawNDGrid(x,y,cols,rows,filledRatio,col,a){
  a=a===undefined?1:a;
  var sz=9,gap=3,fillN=Math.round(cols*rows*filledRatio);
  g.save();g.globalAlpha*=a;
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var idx=r*cols+c;
      var cx=x+c*(sz+gap),cy=y+r*(sz+gap);
      g.fillStyle=idx<fillN?col:P.dim;
      g.fillRect(cx,cy,sz,sz);
    }
  }
  g.restore();
}

function drawWorkGroup(x,y,n,col,a){
  a=a===undefined?1:a;
  var sz=8,gap=2,cols=8,rows=Math.ceil(n/8);
  g.save();g.globalAlpha*=a;
  rr(x-4,y-4,(sz+gap)*cols+2,(sz+gap)*rows+2,4,'',P.teal,1.5);
  for(var i=0;i<n;i++){
    var r=Math.floor(i/cols),c=i%cols;
    g.fillStyle=col;
    g.fillRect(x+c*(sz+gap),y+r*(sz+gap),sz,sz);
  }
  g.restore();
}

/* ── scene functions ── */
function drawS0(t){
  // saxpy intro
  var a1=eO(wn(t,0,0.2)),a2=eO(wn(t,0.2,0.4)),a3=eO(wn(t,0.35,0.55)),
      a4=eO(wn(t,0.5,0.7)),a5=eO(wn(t,0.65,0.85));

  // title
  tx('오늘 할 일: GPU로 saxpy 계산하기',350,38,{sz:15,c:P.teal,w:'bold',a:a1});
  tx('y[i] = a × x[i] + y[i]  (i = 0 … 999,999)',350,72,{sz:17,c:P.txt,w:'bold',a:a2});

  // three float arrays
  var bx=[60,238,416];
  var bc=[P.xBuf,P.yBuf,P.oBuf];
  var bl=['x[ ]','y[ ]','out[ ]'];
  var bd=['[0.5, 1.2, 3.7, ...]','[2.1, 0.8, 4.1, ...]','(결과 저장소)'];
  var ba=[a3,a3,a4];
  for(var i=0;i<3;i++){
    drawBuf(bx[i],106,bl[i],bd[i],bc[i],ba[i]);
  }
  // a scalar
  g.save();g.globalAlpha*=a4;
  rr(594,106,88,52,6,P.bg3,P.aBuf,1.5);
  tx('a',638,120,{sz:10,c:P.aBuf,w:'bold'});
  tx('= 2.0f',638,140,{sz:11,c:P.txt});
  g.restore();

  // bottom label
  tx('이 계산을 OpenCL로 GPU에서 돌린다',350,198,{sz:12,c:P.muted,a:a5});
  tx('Platform → Device → Context → Queue → Buffer → Kernel → NDRange → Enqueue',350,222,{sz:9,c:P.tealD,a:a5});

  // API flow hint
  if(a5>0.1){
    var steps=['clGetPlatformIDs','clCreateContext','clCreateBuffer','clBuildProgram','clSetKernelArg','clEnqueueNDRangeKernel','clFinish'];
    var sx=38;
    for(var j=0;j<steps.length;j++){
      rr(sx,252,88,26,5,P.bg3,P.tealD,1);
      tx(steps[j],sx+44,265,{sz:7,c:P.teal,a:a5});
      if(j<steps.length-1){arr(sx+88,265,sx+96,265,P.dim,1,a5,5);}
      sx+=96;
    }
  }

  // data size note
  tx('1,000,000개의 float — GPU 병렬 처리로 한 번에!',350,315,{sz:11,c:P.yellow,a:a5});
}

function drawS1(t){
  // Platform & Device selection
  var a1=eO(wn(t,0,0.18)),a2=eO(wn(t,0.15,0.35)),a3=eO(wn(t,0.3,0.5)),
      a4=eO(wn(t,0.48,0.65)),a5=eO(wn(t,0.62,0.8));

  tx('어느 공장을 쓸까? — Platform & Device 선택',350,32,{sz:13,c:P.teal,w:'bold',a:a1});

  // Platform cards
  var pcols=[P.intel,P.amd,P.nvidia];
  var plabs=['Intel','AMD','NVIDIA'];
  var psub=['CPU OpenCL','GPU OpenCL','GPU CUDA/CL'];
  var px=[44,224,404];
  var psel=[false,true,false];
  var pa=[a2,a3,a2];
  for(var i=0;i<3;i++){
    drawPlatformCard(px[i],60,plabs[i],psub[i],pcols[i],psel[i],pa[i]);
  }

  // code for platform query
  g.save();g.globalAlpha*=a3;
  rr(36,146,300,50,6,P.bg3,'',0);
  codeLine('cl_platform_id platforms[4];',44,158,1,P.teal);
  codeLine('clGetPlatformIDs(4, platforms, &nPlatforms);',44,174,1,P.teal);
  g.restore();

  // arrow to device
  arr(344,92,392,92,P.amd,2,a4,8);
  tx('선택!',368,82,{sz:9,c:P.amd,w:'bold',a:a4});

  // Device chip
  drawDeviceChip(536,60,'AMD Radeon GPU','GPU Device (CL 3.0)',P.amd,a4);

  // device query code
  g.save();g.globalAlpha*=a4;
  rr(530,118,162,50,6,P.bg3,'',0);
  codeLine('cl_device_id device;',538,130,1,P.amd);
  codeLine('clGetDeviceIDs(',538,146,1,P.amd);
  codeLine('  platform, GPU, 1, &device, 0);',538,160,1,P.amd);
  g.restore();

  // key point
  g.save();g.globalAlpha*=a5;
  rr(36,210,628,72,8,P.bg3,P.teal+'44',1);
  tx('★ Platform = "어느 회사 드라이버를 쓸지" 선택',350,232,{sz:11,c:P.teal,w:'bold'});
  tx('Device = "그 회사의 어떤 장치를 쓸지" 선택 (CPU? GPU? FPGA?)',350,254,{sz:10,c:P.txt});
  tx('하나의 머신에 여러 platform, 여러 device가 공존할 수 있음',350,272,{sz:9,c:P.muted});
  g.restore();

  // CL_DEVICE_TYPE note
  tx('CL_DEVICE_TYPE_GPU → GPU 장치만 선택',350,308,{sz:9,c:P.muted,a:a5});
  tx('CL_DEVICE_TYPE_ALL → 사용 가능한 모든 장치',350,326,{sz:9,c:P.muted,a:a5});
}

function drawS2(t){
  // Context + Command Queue
  var a1=eO(wn(t,0,0.18)),a2=eO(wn(t,0.15,0.35)),a3=eO(wn(t,0.32,0.52)),
      a4=eO(wn(t,0.5,0.68)),a5=eO(wn(t,0.65,0.82));

  tx('계약서 + 주문 창구 — Context & Command Queue',350,32,{sz:13,c:P.teal,w:'bold',a:a1});

  // Context box (big container)
  g.save();g.globalAlpha*=a2;
  drawContextBox(36,55,290,130,1);
  tx('clCreateContext',181,75,{sz:9,c:P.tealD});
  drawDeviceChip(86,84,'AMD GPU','CL 3.0',P.amd,1);
  // memory area inside context
  rr(56,104,100,68,5,P.bg4,P.tealD+'88',1);
  tx('GPU memory',106,120,{sz:8,c:P.tealD});
  tx('(버퍼 공간)',106,136,{sz:8,c:P.muted});
  tx('clCreateBuffer→',106,152,{sz:7,c:P.tealD});
  g.restore();

  // Command Queue
  g.save();g.globalAlpha*=a3;
  drawQueueBox(360,55,[
    {label:'WriteBuffer (x_buf)', col:P.xBuf},
    {label:'WriteBuffer (y_buf)', col:P.yBuf},
    {label:'NDRangeKernel',       col:P.teal},
    {label:'ReadBuffer (out_buf)',col:P.oBuf},
  ],1);
  g.restore();

  // arrow from queue to context
  arr(550,120,556,120,P.green,2,a4,7);
  arr(556,120,560,120,P.green,2,a4,7);

  // the GPU device receives
  g.save();g.globalAlpha*=a4;
  rr(562,95,110,50,6,P.bg4,P.amd,1.5);
  tx('AMD GPU',617,108,{sz:9,c:P.amd,w:'bold'});
  tx('명령 실행!',617,126,{sz:8,c:P.muted});
  g.restore();

  // arrow queue → gpu
  arr(552,122,560,118,P.green,2,a4,6);

  // code
  g.save();g.globalAlpha*=a3;
  rr(36,202,290,60,6,P.bg3,'',0);
  codeLine('cl_context ctx =',44,214,1,P.teal);
  codeLine('  clCreateContext(0,1,&device,0,0,0);',44,228,1,P.teal);
  codeLine('cl_command_queue q =',44,244,1,P.green);
  codeLine('  clCreateCommandQueueWithProperties(ctx,device,0,0);',44,258,1,P.green);
  g.restore();

  // key insight
  g.save();g.globalAlpha*=a5;
  rr(36,278,628,72,8,P.bg3,P.teal+'44',1);
  tx('★ Context = "어떤 device와 일할지" 작업 공간 계약서',350,298,{sz:11,c:P.teal,w:'bold'});
  tx('Command Queue = "GPU에 명령을 줄 서서 보내는 창구"',350,318,{sz:10,c:P.txt});
  tx('같은 Context에서 여러 Queue를 만들 수 있음 (병렬 큐)',350,336,{sz:9,c:P.muted});
  g.restore();
}

function drawS3(t){
  // Buffers: clCreateBuffer + clEnqueueWriteBuffer
  var a1=eO(wn(t,0,0.15)),a2=eO(wn(t,0.12,0.30)),a3=eO(wn(t,0.28,0.46)),
      a4=eO(wn(t,0.44,0.62)),a5=eO(wn(t,0.6,0.78)),a6=eO(wn(t,0.76,0.92));

  tx('창고 예약 + 짐 배달 — cl_mem 버퍼',350,30,{sz:13,c:P.teal,w:'bold',a:a1});

  // CPU side (left)
  g.save();g.globalAlpha*=a2;
  rr(22,48,200,200,8,P.bg2,P.muted,1);
  tx('CPU 메모리',122,66,{sz:10,c:P.muted,w:'bold'});
  drawBuf(32,80,'float x[]','[0.5,1.2,3.7,...]',P.xBuf,1);
  drawBuf(32,144,'float y[]','[2.1,0.8,4.1,...]',P.yBuf,1);
  g.restore();

  // GPU side (right)
  g.save();g.globalAlpha*=a3;
  rr(430,48,252,270,8,P.bg2,P.teal,1);

/* ── animation engine ── */
var curIdx=0,sceneStart=0,paused=false,raf=null;

function buildDots(){
  dotsEl.innerHTML='';
  SCENES.forEach(function(_,i){
    var d=document.createElement('span');
    d.className='oclbp-dot'+(i===0?' active':'');
    d.addEventListener('click',function(){jumpTo(i);});
    dotsEl.appendChild(d);
  });
}
buildDots();

function updateUI(idx){
  var sc=SCENES[idx];
  actEl.textContent=sc.act;
  snEl.textContent=(idx+1)+'/'+SCENES.length;
  stEl.textContent=sc.title;
  coEl.textContent=sc.concept;
  prevB.disabled=idx===0;
  nextB.disabled=idx===SCENES.length-1;
  var dots=dotsEl.querySelectorAll('.oclbp-dot');
  dots.forEach(function(d,i){d.className='oclbp-dot'+(i===idx?' active':'');});
}
updateUI(0);

function jumpTo(idx){
  idx=Math.max(0,Math.min(SCENES.length-1,idx));
  curIdx=idx;sceneStart=performance.now();
  updateUI(idx);
}

prevB.addEventListener('click',function(){jumpTo(curIdx-1);});
nextB.addEventListener('click',function(){jumpTo(curIdx+1);});

function loop(now){
  raf=requestAnimationFrame(loop);
  var sc=SCENES[curIdx];
  var t=Math.min(1,(now-sceneStart)/sc.dur);
  g.clearRect(0,0,W,H);
  g.fillStyle=P.bg;g.fillRect(0,0,W,H);
  sc.draw(t);
  if(t>=1&&!paused&&curIdx<SCENES.length-1){
    jumpTo(curIdx+1);
  }
}
sceneStart=performance.now();
raf=requestAnimationFrame(loop);

// Touch swipe
var touchStartX=0;
cv.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>40){jumpTo(curIdx+(dx<0?1:-1));}
},{passive:true});

// Cleanup
if(typeof MutationObserver!=='undefined'){
  new MutationObserver(function(ms){
    ms.forEach(function(m){
      m.removedNodes.forEach(function(n){
        if(n===root||n.contains&&n.contains(root)){
          cancelAnimationFrame(raf);
          window.removeEventListener('resize',resizeCanvas);
        }
      });
    });
  }).observe(document.body,{childList:true,subtree:true});
}

})();

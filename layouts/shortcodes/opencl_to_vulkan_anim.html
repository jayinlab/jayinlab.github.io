{{- $id := printf "ocl2vk-%d" now.UnixNano -}}
<style>
.ocl2vk-wrap{max-width:720px;margin:2rem auto;font-family:'Segoe UI',system-ui,sans-serif;}
.ocl2vk-mobile-hint{display:none;background:#161224;border:1px solid #b39ddb55;border-radius:6px;padding:7px 12px;font-size:11px;color:#b39ddb;margin-bottom:6px;text-align:center;}
@media(max-width:700px){.ocl2vk-mobile-hint{display:block;}}
.ocl2vk-hdr{background:#131020;border-radius:8px 8px 0 0;padding:6px 12px;display:flex;align-items:center;gap:8px;}
.ocl2vk-act{font-size:10px;background:#201a38;color:#b39ddb;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.ocl2vk-snum{font-size:10px;color:#e0b0ff;font-weight:bold;min-width:44px;}
.ocl2vk-stitle{font-size:12px;color:#c8d0de;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ocl2vk-cv-wrap{overflow:hidden;line-height:0;background:#0d0b18;}
canvas.ocl2vk-cv{display:block;}
.ocl2vk-foot{background:#131020;border-radius:0 0 8px 8px;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ocl2vk-concept{font-size:11px;color:#b39ddb;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ocl2vk-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ocl2vk-btn{background:#161224;border:1px solid #2a1e4a;color:#b39ddb;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;}
.ocl2vk-btn:hover:not(:disabled){background:#201a38;}
.ocl2vk-btn:disabled{opacity:.4;cursor:default;}
.ocl2vk-dots{display:flex;gap:4px;align-items:center;}
.ocl2vk-dot{width:7px;height:7px;border-radius:50%;background:#2a1e4a;cursor:pointer;transition:background .2s,transform .2s;}
.ocl2vk-dot.active{background:#b39ddb;transform:scale(1.3);}
</style>

<div id="{{ $id }}" class="ocl2vk-wrap">
  <div class="ocl2vk-mobile-hint">📱 가로 화면이나 PC에서 더 잘 보입니다 — 터치로 장면 이동 가능</div>
  <div class="ocl2vk-hdr">
    <span class="ocl2vk-act"></span>
    <span class="ocl2vk-snum"></span>
    <span class="ocl2vk-stitle"></span>
  </div>
  <div class="ocl2vk-cv-wrap"><canvas class="ocl2vk-cv"></canvas></div>
  <div class="ocl2vk-foot">
    <div class="ocl2vk-concept"></div>
    <div class="ocl2vk-nav">
      <button class="ocl2vk-btn ocl2vk-prev">◀</button>
      <div class="ocl2vk-dots"></div>
      <button class="ocl2vk-btn ocl2vk-next">▶</button>
      <button class="ocl2vk-btn ocl2vk-summary" style="margin-left:6px;font-size:11px;">📋 요약</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var root=document.getElementById('{{ $id }}');
if(!root)return;
var wrap=root.querySelector('.ocl2vk-cv-wrap');
var cv=root.querySelector('.ocl2vk-cv');
var g=cv.getContext('2d');
var actEl=root.querySelector('.ocl2vk-act');
var snEl=root.querySelector('.ocl2vk-snum');
var stEl=root.querySelector('.ocl2vk-stitle');
var coEl=root.querySelector('.ocl2vk-concept');
var prevB=root.querySelector('.ocl2vk-prev');
var nextB=root.querySelector('.ocl2vk-next');
var summaryB=root.querySelector('.ocl2vk-summary');
var dotsEl=root.querySelector('.ocl2vk-dots');

var W=700,H=390;
var dpr=Math.min(window.devicePixelRatio||1,2);
function resizeCanvas(){
  var cw=root.offsetWidth||W;
  var sc=Math.min(1,cw/W);
  var dw=Math.round(W*sc),dh=Math.round(H*sc);
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=dw+'px';cv.style.height=dh+'px';
  wrap.style.height=dh+'px';
  g.setTransform(1,0,0,1,0,0);g.scale(dpr,dpr);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

/* palette */
var P={
  bg:'#0d0b18',bg2:'#131020',bg3:'#1a1530',bg4:'#221d40',
  /* OpenCL = teal */
  ocl:'#00c9a7',oclD:'#007a64',ocl2:'#7ee0c6',
  /* SPIR-V / clspv = orange/yellow */
  spv:'#f4a261',spvD:'#b06020',spv2:'#ffd166',
  /* Vulkan = blue */
  vk:'#8ab4ff',vkD:'#4a72cc',vk2:'#b39ddb',
  /* buffer colors */
  xc:'#8ab4ff',yc:'#7ee0c6',oc:'#f4a261',ac:'#ffd166',
  txt:'#e8eaed',muted:'#7a7a9a',dim:'#221d40',
  green:'#7ee0c6',red:'#ff6b6b',yellow:'#ffd166',purple:'#b39ddb',
};

/* helpers */
function cl(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?1:hi;return Math.max(lo,Math.min(hi,v));}
function eO(t){t=cl(t);return 1-(1-t)*(1-t)*(1-t);}
function eIO(t){t=cl(t);return t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function wn(t,s,e){return cl((t-s)/(e-s));}
function lp(a,b,t){return a+(b-a)*t;}

function rr(x,y,w,h,r,fill,stroke,sw){
  g.beginPath();
  if(g.roundRect){g.roundRect(x,y,w,h,r);}
  else{
    r=Math.min(r,w/2,h/2);
    g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.arcTo(x+w,y,x+w,y+r,r);
    g.lineTo(x+w,y+h-r);g.arcTo(x+w,y+h,x+w-r,y+h,r);
    g.lineTo(x+r,y+h);g.arcTo(x,y+h,x,y+h-r,r);
    g.lineTo(x,y+r);g.arcTo(x,y,x+r,y,r);g.closePath();
  }
  if(fill){g.fillStyle=fill;g.fill();}
  if(stroke&&sw){g.strokeStyle=stroke;g.lineWidth=sw;g.stroke();}
}

function tx(s,x,y,opt){
  opt=opt||{};
  var sz=opt.sz||12,c=opt.c||P.txt,a=opt.a===undefined?1:opt.a,
      al=opt.al||'center',w=opt.w||'normal';
  g.save();g.globalAlpha*=a;
  g.fillStyle=c;g.font=w+' '+sz+'px "Segoe UI",system-ui,sans-serif';
  g.textAlign=al;g.textBaseline='middle';
  g.fillText(s,x,y);
  g.restore();
}

function arr(x1,y1,x2,y2,col,lw,a,hs){
  a=a===undefined?1:a;lw=lw||1.5;hs=hs||7;
  g.save();g.globalAlpha*=a;
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1){g.restore();return;}
  var ux=dx/len,uy=dy/len;
  g.strokeStyle=col;g.lineWidth=lw;g.lineCap='round';
  g.beginPath();g.moveTo(x1,y1);g.lineTo(x2-ux*hs*0.5,y2-uy*hs*0.5);g.stroke();
  g.fillStyle=col;g.beginPath();
  g.moveTo(x2,y2);
  g.lineTo(x2-ux*hs-uy*hs*0.4,y2-uy*hs+ux*hs*0.4);
  g.lineTo(x2-ux*hs+uy*hs*0.4,y2-uy*hs-ux*hs*0.4);
  g.closePath();g.fill();
  g.restore();
}

/* column headers */
function drawColHeaders(aL,aM,aR){
  g.save();g.globalAlpha*=Math.max(aL,aM,aR);
  rr(22,38,196,24,4,P.ocl+'22','',0);
  rr(252,38,196,24,4,P.spv+'22','',0);
  rr(482,38,196,24,4,P.vk+'22','',0);
  g.restore();
  tx('OpenCL',120,50,{sz:10,c:P.ocl,w:'bold',a:aL});
  tx('clspv / SPIR-V',350,50,{sz:10,c:P.spv,w:'bold',a:aM});
  tx('Vulkan',580,50,{sz:10,c:P.vk,w:'bold',a:aR});
  // dividers
  g.save();g.globalAlpha*=Math.max(aL,aM,aR)*0.3;
  g.strokeStyle=P.muted;g.lineWidth=1;g.setLineDash([3,4]);
  g.beginPath();g.moveTo(248,32);g.lineTo(248,390);g.stroke();
  g.beginPath();g.moveTo(478,32);g.lineTo(478,390);g.stroke();
  g.setLineDash([]);
  g.restore();
}

function codeBox(x,y,w,h,lines,col,a){
  a=a===undefined?1:a;
  g.save();g.globalAlpha*=a;
  rr(x,y,w,h,6,P.bg3,col+'66',1.2);
  for(var i=0;i<lines.length;i++){
    g.fillStyle=lines[i][1]||P.txt;
    g.font='normal 9px "Consolas","Courier New",monospace';
    g.textAlign='left';g.textBaseline='middle';
    g.fillText(lines[i][0],x+8,y+12+i*14);
  }
  g.restore();
}

/* ── SCENE FUNCTIONS ── */

function drawS0(t){
  /* Two worlds: same saxpy, different API */
  var a1=eO(wn(t,0,0.2)),aL=eO(wn(t,0.18,0.38)),aM=eO(wn(t,0.36,0.54)),aR=eO(wn(t,0.52,0.70)),a5=eO(wn(t,0.68,0.85));

  tx('같은 saxpy — 두 가지 다른 언어',350,22,{sz:14,c:P.purple,w:'bold',a:a1});

  /* OpenCL side */
  g.save();g.globalAlpha*=aL;
  rr(22,36,208,310,8,P.bg2,P.ocl,1.8);
  tx('OpenCL',126,56,{sz:12,c:P.ocl,w:'bold'});
  codeBox(32,70,188,200,[
    ['__kernel void saxpy(',P.txt],
    ['  __global float* x,',P.xc],
    ['  __global float* y,',P.yc],
    ['  __global float* out,',P.oc],
    ['  float a) {',P.ac],
    ['  int i=get_global_id(0);',P.ocl2],
    ['  out[i]=a*x[i]+y[i];',P.ocl2],
    ['}',P.txt],
  ],P.ocl,1);
  codeBox(32,278,188,58,[
    ['clSetKernelArg(k,0,&x_buf);',P.ocl],
    ['clSetKernelArg(k,1,&y_buf);',P.ocl],
    ['clSetKernelArg(k,2,&out_buf);',P.ocl],
  ],P.ocl,1);
  g.restore();

  /* clspv center — .cl → .spv 출력, Vulkan 직접 출력이 아님 */
  g.save();g.globalAlpha*=aM;
  rr(252,150,196,72,10,P.bg3,P.spv,2);
  tx('clspv',350,166,{sz:13,c:P.spv,w:'bold'});
  tx('.cl  →  .spv  (SPIR-V)',350,184,{sz:9,c:P.spv2});
  tx('OpDecorate / Binding 포함',350,199,{sz:8,c:P.muted});
  arr(232,182,250,182,P.spv,2.5,aM,9);
  g.restore();

  /* .spv → OpenCL runtime → Vulkan 연결 */
  g.save();g.globalAlpha*=aR;
  tx('OpenCL',460,170,{sz:7,c:P.ocl,w:'bold'});
  tx('runtime',460,180,{sz:7,c:P.ocl});
  arr(450,186,468,186,P.vk,1.8,aR,7);
  g.restore();

  /* Vulkan side */
  g.save();g.globalAlpha*=aR;
  rr(470,36,208,310,8,P.bg2,P.vk,1.8);
  tx('Vulkan',564,52,{sz:12,c:P.vk,w:'bold'});
  tx('(런타임 내부 호출)',574,67,{sz:8,c:P.muted});
  codeBox(480,78,188,112,[
    ['VkDescriptorSetLayout dsl;',P.vk],
    ['VkDescriptorSet ds;',P.vk],
    ['VkPipelineLayout layout;',P.vk2],
    ['VkPipeline pipeline;',P.vk2],
    ['// ...많은 설정...', P.muted],
  ],P.vk,1);
  codeBox(480,200,188,80,[
    ['vkCmdBindPipeline(...);',P.vk],
    ['vkCmdBindDescriptorSets(...);',P.vk],
    ['vkCmdDispatch(15625,1,1);',P.vk],
  ],P.vk,1);
  codeBox(480,290,188,46,[
    ['vkUpdateDescriptorSets(...);',P.vk2],
    ['// 총 ~150줄',P.muted],
  ],P.vk,1);
  g.restore();

  tx('clspv: .cl → .spv (SPIR-V) 생성 | OpenCL 런타임이 .spv를 읽어 내부에서 Vulkan 호출',350,364,{sz:9,c:P.yellow,a:a5});
}

function drawS1(t){
  /* clspv 컴파일러 내부 */
  var a1=eO(wn(t,0,0.18)),a2=eO(wn(t,0.16,0.34)),a3=eO(wn(t,0.32,0.50)),
      a4=eO(wn(t,0.48,0.65)),a5=eO(wn(t,0.63,0.80));

  tx('clspv — OpenCL C를 SPIR-V로 변환하는 컴파일러',350,22,{sz:13,c:P.spv,w:'bold',a:a1});

  /* input: .cl file */
  g.save();g.globalAlpha*=a2;
  rr(22,50,180,120,8,P.bg3,P.ocl,1.5);
  tx('saxpy.cl',112,70,{sz:11,c:P.ocl,w:'bold'});
  codeBox(32,84,160,76,[
    ['__kernel void saxpy(',P.txt],
    ['  __global float* x, // arg0',P.xc],
    ['  __global float* y, // arg1',P.yc],
    ['  __global float* out,// arg2',P.oc],
    ['  float a) { ... }   // arg3',P.ac],
  ],P.ocl,1);
  g.restore();

  /* compile arrow + gear */
  var gA=wn(t,0.34,0.70);
  if(gA>0){
    var ea=eO(gA);
    arr(204,110,248,110,P.spv,2.5,ea,9);
    g.save();g.globalAlpha*=ea;
    g.translate(270,110);g.rotate(gA*Math.PI*6);
    g.fillStyle=P.spv+'88';
    for(var i=0;i<6;i++){g.save();g.rotate(i*Math.PI/3);g.fillRect(-3,18,6,10);g.restore();}
    g.beginPath();g.arc(0,0,18,0,Math.PI*2);g.fillStyle=P.spv;g.fill();
    g.beginPath();g.arc(0,0,8,0,Math.PI*2);g.fillStyle=P.bg;g.fill();
    g.restore();
    tx('clspv',270,140,{sz:9,c:P.spv,w:'bold',a:ea});
  }

  /* output: .spv */
  g.save();g.globalAlpha*=a4;
  rr(294,50,200,190,8,P.bg3,P.spv,1.8);
  tx('saxpy.spv (SPIR-V)',394,70,{sz:10,c:P.spv,w:'bold'});
  codeBox(304,84,180,148,[
    ['; arg0 → binding=0',P.xc],
    ['OpDecorate %x DescriptorSet 0',P.xc],
    ['OpDecorate %x Binding 0',P.xc],
    ['; arg1 → binding=1',P.yc],
    ['OpDecorate %y DescriptorSet 0',P.yc],
    ['OpDecorate %y Binding 1',P.yc],
    ['; arg2 → binding=2',P.oc],
    ['OpDecorate %out DescriptorSet 0',P.oc],
    ['OpDecorate %out Binding 2',P.oc],
    ['; arg3 → PushConstant',P.ac],
    ['OpDecorate %a PushConstant',P.ac],
  ],P.spv,1);
  g.restore();

  /* Vulkan reads SPIR-V */
  arr(496,145,548,145,P.vk,2,a5,8);
  g.save();g.globalAlpha*=a5;
  rr(550,110,132,70,8,P.bg3,P.vk,1.5);
  tx('Vulkan',616,130,{sz:10,c:P.vk,w:'bold'});
  tx('SPIR-V reflection으로',616,148,{sz:8,c:P.muted});
  tx('DSL 자동 구성',616,162,{sz:8,c:P.vk});
  g.restore();

  /* bottom note */
  g.save();g.globalAlpha*=a5;
  rr(22,256,656,56,8,P.bg3,P.spv+'44',1);
  tx('SPIR-V decoration = "이 변수는 set 0 binding 0 번 슬롯에 있어요" 라는 주소 레이블',350,276,{sz:10,c:P.spv,w:'bold'});
  tx('Vulkan 드라이버가 이 레이블을 읽어서 DSL을 구성하는 데 사용',350,296,{sz:9,c:P.txt});
  g.restore();

  tx('clspv --cl-std=CL2.0 saxpy.cl -o saxpy.spv',350,334,{sz:9,c:P.muted,a:a5});
}

function drawS2(t){
  /* arg0~3 → SPIR-V decoration 1:1 매핑 */
  var a1=eO(wn(t,0,0.15));
  drawColHeaders(a1,a1,a1);

  var rows=[
    {arg:'arg0  __global float* x', dec:'OpDecorate %x  DescriptorSet 0\nOpDecorate %x  Binding 0', vk:'binding=0\nSTORAGE_BUFFER', colL:P.xc, colM:P.xc, colR:P.xc},
    {arg:'arg1  __global float* y', dec:'OpDecorate %y  DescriptorSet 0\nOpDecorate %y  Binding 1', vk:'binding=1\nSTORAGE_BUFFER', colL:P.yc, colM:P.yc, colR:P.yc},
    {arg:'arg2  __global float* out',dec:'OpDecorate %out DescriptorSet 0\nOpDecorate %out Binding 2',vk:'binding=2\nSTORAGE_BUFFER', colL:P.oc, colM:P.oc, colR:P.oc},
    {arg:'arg3  const float a',      dec:'OpDecorate %a  PushConstant',                              vk:'PushConstantRange\noffset=0 size=4', colL:P.ac, colM:P.ac, colR:P.ac},
  ];

  var rowAs=[eO(wn(t,0.15,0.32)),eO(wn(t,0.30,0.47)),eO(wn(t,0.45,0.62)),eO(wn(t,0.60,0.77))];
  var a5=eO(wn(t,0.75,0.90));

  for(var i=0;i<rows.length;i++){
    var r=rows[i],ra=rowAs[i],ry=72+i*72;
    // left: OpenCL arg
    g.save();g.globalAlpha*=ra;
    rr(24,ry,198,58,6,P.bg3,r.colL+'88',1.5);
    tx(r.arg.split('  ')[0],123,ry+14,{sz:8,c:P.muted,al:'center'});
    tx(r.arg.split('  ')[1]||'',123,ry+30,{sz:9,c:r.colL,w:'bold',al:'center'});
    if(r.arg.split('  ')[2])tx(r.arg.split('  ')[2],123,ry+46,{sz:8,c:r.colL,al:'center'});
    // arrow
    arr(222,ry+28,252,ry+28,r.colM,1.5,ra,6);
    // center: SPIR-V
    rr(254,ry,198,58,6,P.bg3,r.colM+'88',1.5);
    var dlines=r.dec.split('\n');
    tx(dlines[0],353,ry+(dlines.length>1?18:28),{sz:7.5,c:r.colM,al:'center'});
    if(dlines[1])tx(dlines[1],353,ry+38,{sz:7.5,c:r.colM,al:'center'});
    // arrow
    arr(452,ry+28,482,ry+28,r.colR,1.5,ra,6);
    // right: Vulkan
    rr(484,ry,198,58,6,P.bg3,r.colR+'88',1.5);
    var vlines=r.vk.split('\n');
    tx(vlines[0],583,ry+(vlines.length>1?18:28),{sz:9,c:r.colR,w:'bold',al:'center'});
    if(vlines[1])tx(vlines[1],583,ry+38,{sz:8,c:P.muted,al:'center'});
    g.restore();
  }

  g.save();g.globalAlpha*=a5;
  rr(24,362,656,22,6,P.bg3,P.yellow+'44',1);
  tx('★ __global 포인터 → StorageBuffer descriptor   |   스칼라 → PushConstant  (clspv 기본 규칙)',350,373,{sz:9,c:P.yellow});
  g.restore();
}

function drawS3(t){
  /* SPIR-V decoration → VkDescriptorSetLayoutBinding */
  var a1=eO(wn(t,0,0.18)),a2=eO(wn(t,0.16,0.34)),a3=eO(wn(t,0.32,0.50)),a4=eO(wn(t,0.48,0.66)),a5=eO(wn(t,0.64,0.80));

  tx('SPIR-V decoration → VkDescriptorSetLayoutBinding',350,22,{sz:12,c:P.spv,w:'bold',a:a1});

  /* SPIR-V box */
  g.save();g.globalAlpha*=a2;
  rr(22,38,240,230,8,P.bg3,P.spv,1.5);
  tx('SPIR-V (clspv 출력)',142,58,{sz:9,c:P.spv,w:'bold'});
  codeBox(32,70,220,188,[
    ['OpDecorate %x   DescriptorSet 0',P.xc],
    ['OpDecorate %x   Binding 0',P.xc],
    ['',P.muted],
    ['OpDecorate %y   DescriptorSet 0',P.yc],
    ['OpDecorate %y   Binding 1',P.yc],
    ['',P.muted],
    ['OpDecorate %out DescriptorSet 0',P.oc],
    ['OpDecorate %out Binding 2',P.oc],
    ['',P.muted],
    ['OpTypePointer StorageBuffer',P.xc],
    ['OpTypePointer StorageBuffer',P.yc],
    ['OpTypePointer StorageBuffer',P.oc],
  ],P.spv,1);
  g.restore();

  /* arrow */
  arr(264,152,298,152,P.purple,2.5,a3,9);
  tx('Vulkan\nreflection',281,138,{sz:8,c:P.purple,a:a3});

  /* VkDescriptorSetLayoutBinding */
  g.save();g.globalAlpha*=a4;
  rr(300,38,230,230,8,P.bg3,P.vk,1.5);
  tx('VkDescriptorSetLayoutBinding[]',415,58,{sz:8.5,c:P.vk,w:'bold'});
  var binds=[
    {b:'binding=0',t:'STORAGE_BUFFER',s:'COMPUTE',c:P.xc},
    {b:'binding=1',t:'STORAGE_BUFFER',s:'COMPUTE',c:P.yc},
    {b:'binding=2',t:'STORAGE_BUFFER',s:'COMPUTE',c:P.oc},
  ];
  for(var i=0;i<binds.length;i++){
    var by=74+i*60;
    rr(310,by,210,52,4,P.bg4,binds[i].c+'88',1.2);
    tx('{ .binding='+i,415,by+12,{sz:8,c:binds[i].c,al:'center'});
    tx('.descriptorType='+binds[i].t,415,by+26,{sz:7,c:P.muted,al:'center'});
    tx('.stageFlags='+binds[i].s+' }',415,by+40,{sz:7,c:P.muted,al:'center'});
  }
  g.restore();

  /* vkCreateDescriptorSetLayout */

/* ── engine ── */
var curIdx=0,sceneStart=0,raf=null;

function buildDots(){
  dotsEl.innerHTML='';
  SCENES.forEach(function(_,i){
    var d=document.createElement('span');
    d.className='ocl2vk-dot'+(i===0?' active':'');
    d.addEventListener('click',function(){jumpTo(i);});
    dotsEl.appendChild(d);
  });
}
buildDots();

function updateUI(idx){
  var sc=SCENES[idx];
  actEl.textContent=sc.act;
  snEl.textContent=(idx+1)+'/'+SCENES.length;
  stEl.textContent=sc.title;
  coEl.textContent=sc.concept;
  prevB.disabled=idx===0;
  nextB.disabled=idx===SCENES.length-1;
  summaryB.textContent=idx===SCENES.length-1?'▶ 처음':'📋 요약';
  dotsEl.querySelectorAll('.ocl2vk-dot').forEach(function(d,i){
    d.className='ocl2vk-dot'+(i===idx?' active':'');
  });
}
updateUI(0);

function jumpTo(idx){
  idx=Math.max(0,Math.min(SCENES.length-1,idx));
  curIdx=idx;sceneStart=performance.now();
  updateUI(idx);
}

prevB.addEventListener('click',function(){jumpTo(curIdx-1);});
nextB.addEventListener('click',function(){jumpTo(curIdx+1);});
summaryB.addEventListener('click',function(){jumpTo(curIdx===SCENES.length-1?0:SCENES.length-1);});

function loop(now){
  raf=requestAnimationFrame(loop);
  var sc=SCENES[curIdx];
  var t=Math.min(1,(now-sceneStart)/sc.dur);
  g.clearRect(0,0,W,H);
  g.fillStyle=P.bg;g.fillRect(0,0,W,H);
  sc.draw(t);
}
sceneStart=performance.now();
raf=requestAnimationFrame(loop);

var txSt=null;
cv.addEventListener('touchstart',function(e){txSt=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchend',function(e){
  if(txSt===null)return;
  var dx=e.changedTouches[0].clientX-txSt;
  if(Math.abs(dx)>40){jumpTo(curIdx+(dx<0?1:-1));}
  txSt=null;
},{passive:true});

if(typeof MutationObserver!=='undefined'){
  new MutationObserver(function(ms){
    ms.forEach(function(m){
      m.removedNodes.forEach(function(n){
        if(n===root||n.contains&&n.contains(root)){
          cancelAnimationFrame(raf);
          window.removeEventListener('resize',resizeCanvas);
        }
      });
    });
  }).observe(document.body,{childList:true,subtree:true});
}

})();
</script>

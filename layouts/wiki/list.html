{{ define "main" }}
  <h2>{{ .Title }}</h2>
  {{ .Content }}
  <p class="post-count">총 {{ len .Pages }}개 문서</p>
  <ul class="post-list">
    {{ range .Pages.ByLastmod.Reverse }}
      <li>
        <span class="post-title-group">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </span>
        <span class="meta post-date">{{ .Date.Format "2006-01-02" }}</span>
      </li>
    {{ end }}
  </ul>
{{ end }}
